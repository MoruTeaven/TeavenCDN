<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>TeavenCDN 管理后台与用户中心</title>
    <!-- Remix Icon, Apache-2.0 License, loaded from BootCDN for mainland China accessibility. -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            color-scheme: light;
            --bg: #f5fafb;
            --bg-soft: #edf7f8;
            --surface: rgba(255, 255, 255, 0.84);
            --surface-solid: #ffffff;
            --surface-muted: #f2f7f8;
            --surface-hover: #eaf4f5;
            --text: #12242d;
            --heading: #071b24;
            --muted: #637888;
            --faint: #91a4b1;
            --border: rgba(135, 160, 170, 0.26);
            --border-strong: rgba(69, 95, 107, 0.18);
            --primary: #0f766e;
            --primary-rgb: 15, 118, 110;
            --cyan: #0891b2;
            --cyan-rgb: 8, 145, 178;
            --success: #16a34a;
            --success-rgb: 22, 163, 74;
            --warning: #d97706;
            --warning-rgb: 217, 119, 6;
            --error: #dc2626;
            --error-rgb: 220, 38, 38;
            --info: #0284c7;
            --info-rgb: 2, 132, 199;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 8px rgba(15, 118, 110, 0.04);
            --shadow-md: 0 12px 30px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 24px 70px rgba(15, 23, 42, 0.16);
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --sidebar-width: 284px;
            --sidebar-collapsed: 86px;
            --topbar-height: 72px;
            --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg: #071115;
            --bg-soft: #0b191d;
            --surface: rgba(12, 25, 30, 0.78);
            --surface-solid: #0d1b20;
            --surface-muted: #102229;
            --surface-hover: #152d35;
            --text: #d7e6eb;
            --heading: #f4fbfc;
            --muted: #96abb5;
            --faint: #6d838e;
            --border: rgba(148, 179, 190, 0.18);
            --border-strong: rgba(148, 179, 190, 0.26);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.18), 0 1px 12px rgba(20, 184, 166, 0.04);
            --shadow-md: 0 18px 44px rgba(0, 0, 0, 0.28);
            --shadow-lg: 0 32px 90px rgba(0, 0, 0, 0.42);
        }

        html {
            background: var(--bg);
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, rgba(var(--primary-rgb), 0.13), transparent 34rem), var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            transition: background-color 220ms var(--ease), color 220ms var(--ease);
        }

        body.modal-open,
        body.drawer-open,
        body.nav-open {
            overflow: hidden;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
        }

        a {
            color: inherit;
        }

        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            width: var(--sidebar-width);
            height: 100vh;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.07), transparent 18rem), var(--surface);
            backdrop-filter: blur(18px);
            transition: width 220ms var(--ease), transform 220ms var(--ease), background-color 220ms var(--ease);
        }

        .app-shell.sidebar-collapsed .sidebar {
            width: var(--sidebar-collapsed);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: var(--topbar-height);
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
        }

        .brand-mark {
            display: grid;
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            place-items: center;
            border: 1px solid rgba(var(--primary-rgb), 0.26);
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.16), rgba(var(--primary-rgb), 0.06));
            color: var(--primary);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.04em;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.32);
        }

        .brand-copy {
            min-width: 0;
            transition: opacity 180ms var(--ease), transform 180ms var(--ease);
        }

        .brand-title {
            display: block;
            color: var(--heading);
            font-size: 17px;
            font-weight: 850;
            letter-spacing: -0.03em;
            white-space: nowrap;
        }

        .brand-subtitle,
        .eyebrow,
        .english {
            color: var(--faint);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sidebar-head-action {
            margin-left: auto;
        }

        .app-shell.sidebar-collapsed .brand-copy,
        .app-shell.sidebar-collapsed .nav-section-title,
        .app-shell.sidebar-collapsed .nav-label,
        .app-shell.sidebar-collapsed .nav-badge,
        .app-shell.sidebar-collapsed .sidebar-profile-copy,
        .app-shell.sidebar-collapsed .sidebar-profile .icon-btn {
            pointer-events: none;
            opacity: 0;
            transform: translateX(-6px);
        }

        .nav-menu {
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            padding: 18px 12px;
        }

        .nav-section-title {
            padding: 0 12px 6px;
            color: var(--faint);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: opacity 180ms var(--ease), transform 180ms var(--ease);
        }

        .nav-group {
            display: grid;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            width: 100%;
            align-items: center;
            gap: 12px;
            min-height: 42px;
            padding: 0 12px;
            border-radius: 13px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            text-align: left;
            transition: background-color 180ms var(--ease), color 180ms var(--ease), transform 180ms var(--ease);
        }

        .nav-item i {
            display: grid;
            width: 22px;
            height: 22px;
            flex: 0 0 22px;
            place-items: center;
            font-size: 19px;
        }

        .nav-item:hover {
            background: rgba(var(--primary-rgb), 0.08);
            color: var(--heading);
        }

        .nav-item.active {
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.14), rgba(var(--primary-rgb), 0.07));
            color: var(--primary);
            box-shadow: inset 0 0 0 1px rgba(var(--primary-rgb), 0.16);
        }

        .nav-label {
            flex: 1;
            overflow: hidden;
            color: inherit;
            font-size: 14px;
            font-weight: 750;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: opacity 180ms var(--ease), transform 180ms var(--ease);
        }

        .nav-badge {
            min-width: 24px;
            border-radius: 999px;
            background: rgba(var(--cyan-rgb), 0.12);
            color: var(--cyan);
            font-size: 11px;
            font-weight: 800;
            line-height: 20px;
            text-align: center;
            transition: opacity 180ms var(--ease), transform 180ms var(--ease);
        }

        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 11px;
            margin: 0 12px 14px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(var(--primary-rgb), 0.06);
        }

        .avatar {
            display: grid;
            width: 36px;
            height: 36px;
            flex: 0 0 36px;
            place-items: center;
            border-radius: 999px;
            background: rgba(var(--primary-rgb), 0.13);
            color: var(--primary);
            font-weight: 900;
        }

        .sidebar-profile-copy {
            flex: 1;
            min-width: 0;
            transition: opacity 180ms var(--ease), transform 180ms var(--ease);
        }

        .sidebar-profile-name {
            overflow: hidden;
            color: var(--heading);
            font-size: 13px;
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-profile-role {
            color: var(--faint);
            font-size: 12px;
        }

        .workspace {
            display: flex;
            min-width: 0;
            flex: 1;
            flex-direction: column;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            min-height: var(--topbar-height);
            align-items: center;
            gap: 18px;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(18px);
        }

        .mobile-menu {
            display: none;
        }

        .breadcrumbs {
            display: flex;
            min-width: 0;
            flex: 1;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .breadcrumbs span:last-child {
            overflow: hidden;
            color: var(--heading);
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .global-search {
            position: relative;
            width: min(30vw, 330px);
        }

        .global-search i {
            position: absolute;
            left: 12px;
            top: 50%;
            color: var(--faint);
            transform: translateY(-50%);
        }

        .global-search input {
            width: 100%;
            height: 40px;
            padding: 0 12px 0 38px;
            border: 1px solid var(--border);
            border-radius: 999px;
            outline: none;
            background: var(--surface-muted);
            color: var(--text);
            transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease), background-color 180ms var(--ease);
        }

        .global-search input:focus,
        .input:focus,
        .select:focus,
        .textarea:focus {
            border-color: rgba(var(--primary-rgb), 0.68);
            background: var(--surface-solid);
            box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.12);
        }

        .system-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 36px;
            padding: 0 12px;
            border: 1px solid rgba(var(--success-rgb), 0.22);
            border-radius: 999px;
            background: rgba(var(--success-rgb), 0.08);
            color: var(--success);
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 6px rgba(var(--success-rgb), 0.12);
        }

        .main-content {
            width: 100%;
            max-width: 1560px;
            margin: 0 auto;
            padding: 28px;
        }

        .main-footer {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 0 28px 28px;
            color: var(--faint);
            font-size: 12px;
        }

        .page-hero {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
        }

        .page-title {
            margin: 5px 0 4px;
            color: var(--heading);
            font-size: clamp(26px, 3vw, 36px);
            font-weight: 900;
            letter-spacing: -0.055em;
            line-height: 1.08;
        }

        .page-description {
            max-width: 760px;
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .page-actions,
        .inline-actions,
        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            gap: 16px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .grid-wide {
            grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.9fr);
        }

        .card,
        .stat-card,
        .toolbar,
        .table-shell {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(18px);
        }

        .card,
        .table-shell {
            overflow: hidden;
        }

        .card {
            padding: 18px;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            margin: 0;
            color: var(--heading);
            font-size: 16px;
            font-weight: 850;
            letter-spacing: -0.02em;
        }

        .card-subtitle {
            margin-top: 2px;
            color: var(--faint);
            font-size: 12px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            padding: 18px;
        }

        .stat-card::after {
            position: absolute;
            right: -48px;
            top: -64px;
            width: 160px;
            height: 160px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(var(--primary-rgb), 0.14), transparent 68%);
            content: "";
            pointer-events: none;
        }

        .stat-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .stat-icon,
        .icon-box {
            display: grid;
            width: 40px;
            height: 40px;
            place-items: center;
            border-radius: 14px;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            font-size: 20px;
        }

        .stat-label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .stat-value {
            margin: 14px 0 5px;
            color: var(--heading);
            font-size: 29px;
            font-weight: 900;
            letter-spacing: -0.055em;
        }

        .stat-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 12px;
        }

        .trend-up {
            color: var(--success);
            font-weight: 850;
        }

        .trend-down {
            color: var(--error);
            font-weight: 850;
        }

        .btn,
        .icon-btn,
        .chip,
        .pagination-btn,
        .tab-btn,
        .table-sort {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface-solid);
            color: var(--text);
            cursor: pointer;
            font-weight: 800;
            text-decoration: none;
            transition: transform 180ms var(--ease), background-color 180ms var(--ease), border-color 180ms var(--ease), color 180ms var(--ease), box-shadow 180ms var(--ease);
        }

        .btn {
            min-height: 40px;
            padding: 0 14px;
            font-size: 13px;
        }

        .btn:hover,
        .icon-btn:hover,
        .pagination-btn:hover,
        .tab-btn:hover,
        .table-sort:hover {
            border-color: rgba(var(--primary-rgb), 0.34);
            background: rgba(var(--primary-rgb), 0.08);
            color: var(--primary);
        }

        .btn:active,
        .icon-btn:active {
            transform: translateY(1px);
        }

        .btn.primary {
            border-color: rgba(var(--primary-rgb), 0.9);
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 1), rgba(var(--primary-rgb), 0.9));
            color: #ffffff;
            box-shadow: 0 12px 26px rgba(var(--primary-rgb), 0.22);
        }

        .btn.primary:hover {
            color: #ffffff;
            box-shadow: 0 14px 32px rgba(var(--primary-rgb), 0.28);
        }

        .btn.danger {
            border-color: rgba(var(--error-rgb), 0.25);
            background: rgba(var(--error-rgb), 0.08);
            color: var(--error);
        }

        .btn.small {
            min-height: 32px;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .btn.ghost {
            background: transparent;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            padding: 0;
            border-radius: 13px;
            font-size: 18px;
        }

        .icon-btn.compact {
            width: 34px;
            height: 34px;
            flex-basis: 34px;
            border-radius: 11px;
            font-size: 16px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 850;
            white-space: nowrap;
        }

        .badge.success {
            background: rgba(var(--success-rgb), 0.1);
            color: var(--success);
        }

        .badge.warning {
            background: rgba(var(--warning-rgb), 0.12);
            color: var(--warning);
        }

        .badge.error {
            background: rgba(var(--error-rgb), 0.1);
            color: var(--error);
        }

        .badge.info {
            background: rgba(var(--info-rgb), 0.1);
            color: var(--info);
        }

        .badge.neutral {
            background: var(--surface-muted);
            color: var(--muted);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 16px;
            padding: 14px;
        }

        .toolbar-controls {
            display: flex;
            flex: 1;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .field-inline {
            position: relative;
            min-width: 190px;
        }

        .field-inline i {
            position: absolute;
            left: 12px;
            top: 50%;
            color: var(--faint);
            transform: translateY(-50%);
        }

        .input,
        .select,
        .textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            background: var(--surface-solid);
            color: var(--text);
            transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease), background-color 180ms var(--ease);
        }

        .input,
        .select {
            height: 40px;
            padding: 0 12px;
        }

        .field-inline .input {
            padding-left: 38px;
        }

        .textarea {
            min-height: 92px;
            padding: 10px 12px;
            resize: vertical;
        }

        .table-shell {
            margin-top: 16px;
        }

        .table-scroll {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 880px;
        }

        thead {
            background: var(--surface-muted);
        }

        th,
        td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        td {
            color: var(--text);
            font-size: 13px;
        }

        tbody tr {
            transition: background-color 160ms var(--ease);
        }

        tbody tr:hover {
            background: rgba(var(--primary-rgb), 0.05);
        }

        .table-sort {
            border: 0;
            background: transparent;
            color: inherit;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: inherit;
            text-transform: inherit;
        }

        .resource-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .resource-icon {
            display: grid;
            width: 38px;
            height: 38px;
            flex: 0 0 38px;
            place-items: center;
            border-radius: 13px;
            background: rgba(var(--primary-rgb), 0.1);
            color: var(--primary);
            font-weight: 900;
        }

        .primary-text {
            color: var(--heading);
            font-weight: 850;
        }

        .secondary-text {
            color: var(--faint);
            font-size: 12px;
        }

        .mono {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        .table-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pagination-btn {
            min-width: 34px;
            height: 34px;
            padding: 0 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .pagination-btn.active {
            border-color: rgba(var(--primary-rgb), 0.75);
            background: rgba(var(--primary-rgb), 0.13);
            color: var(--primary);
        }

        .pagination-btn:disabled,
        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .tabs {
            display: inline-flex;
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface-muted);
        }

        .tab-btn {
            min-height: 34px;
            padding: 0 12px;
            border-color: transparent;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
        }

        .tab-btn.active {
            background: var(--surface-solid);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .timeline {
            display: grid;
            gap: 0;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .timeline-item {
            position: relative;
            display: grid;
            gap: 4px;
            padding: 0 0 18px 28px;
            border-left: 1px solid var(--border);
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-item::before {
            position: absolute;
            left: -6px;
            top: 4px;
            width: 11px;
            height: 11px;
            border: 3px solid var(--surface-solid);
            border-radius: 999px;
            background: var(--primary);
            content: "";
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12);
        }

        .chart-card {
            min-height: 328px;
        }

        .chart-svg {
            width: 100%;
            height: 210px;
            overflow: visible;
        }

        .chart-grid-line {
            stroke: var(--border);
            stroke-width: 1;
        }

        .chart-line {
            fill: none;
            stroke: var(--primary);
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 3;
        }

        .chart-area {
            fill: url(#areaFill);
        }

        .bar-list {
            display: grid;
            gap: 13px;
            margin-top: 8px;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr) 42px;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
        }

        .bar-track {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: var(--surface-muted);
        }

        .bar-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.55), rgba(var(--primary-rgb), 0.95));
        }

        .donut-wrap {
            display: grid;
            grid-template-columns: 180px minmax(0, 1fr);
            gap: 20px;
            align-items: center;
        }

        .donut {
            position: relative;
            width: 168px;
            height: 168px;
            border-radius: 50%;
            background: conic-gradient(var(--primary) 0 58%, var(--cyan) 58% 78%, var(--success) 78% 92%, var(--warning) 92% 100%);
        }

        .donut::after {
            position: absolute;
            inset: 18px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: var(--surface-solid);
            color: var(--heading);
            content: attr(data-label);
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.05em;
        }

        .legend {
            display: grid;
            gap: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .list-card {
            display: grid;
            gap: 10px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 15px;
            background: rgba(var(--primary-rgb), 0.035);
        }

        .profile-hero {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
            gap: 16px;
        }

        .profile-card {
            position: relative;
            overflow: hidden;
            min-height: 240px;
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.13), rgba(var(--primary-rgb), 0.05)), var(--surface);
        }

        .profile-card::after {
            position: absolute;
            right: -72px;
            bottom: -86px;
            width: 260px;
            height: 260px;
            border: 1px solid rgba(var(--primary-rgb), 0.22);
            border-radius: 42%;
            content: "";
            transform: rotate(18deg);
        }

        .profile-main {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            display: grid;
            width: 82px;
            height: 82px;
            flex: 0 0 82px;
            place-items: center;
            border: 1px solid rgba(var(--primary-rgb), 0.28);
            border-radius: 26px;
            background: rgba(var(--primary-rgb), 0.14);
            color: var(--primary);
            font-size: 30px;
            font-weight: 950;
        }

        .quota {
            display: grid;
            gap: 9px;
        }

        .meter {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: var(--surface-muted);
        }

        .meter span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.58), rgba(var(--primary-rgb), 0.98));
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 15px;
        }

        .form-field {
            display: grid;
            gap: 7px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        .form-label {
            color: var(--heading);
            font-size: 13px;
            font-weight: 850;
        }

        .required {
            color: var(--error);
        }

        .help-text,
        .error-text {
            margin: 0;
            font-size: 12px;
        }

        .help-text {
            color: var(--faint);
        }

        .error-text {
            display: none;
            color: var(--error);
        }

        .form-field.invalid .input,
        .form-field.invalid .select,
        .form-field.invalid .textarea {
            border-color: rgba(var(--error-rgb), 0.65);
            box-shadow: 0 0 0 4px rgba(var(--error-rgb), 0.1);
        }

        .form-field.invalid .error-text {
            display: block;
        }

        .choice-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .choice {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface-solid);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 750;
        }

        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface-muted);
        }

        .switch {
            position: relative;
            display: inline-flex;
            width: 46px;
            height: 26px;
            flex: 0 0 46px;
            cursor: pointer;
        }

        .switch input {
            position: absolute;
            opacity: 0;
        }

        .switch span {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: #9fb2bc;
            transition: background-color 180ms var(--ease);
        }

        .switch span::after {
            position: absolute;
            left: 3px;
            top: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            content: "";
            transition: transform 180ms var(--ease);
        }

        .switch input:checked + span {
            background: var(--primary);
        }

        .switch input:checked + span::after {
            transform: translateX(20px);
        }

        .dropdown-wrap {
            position: relative;
        }

        .dropdown-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 10px);
            z-index: 60;
            display: none;
            width: 300px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--surface-solid);
            box-shadow: var(--shadow-lg);
        }

        .dropdown-panel.open {
            display: block;
            animation: popIn 160ms var(--ease);
        }

        .dropdown-item {
            display: flex;
            width: 100%;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            text-align: left;
        }

        .dropdown-item:hover {
            background: var(--surface-muted);
        }

        .modal-backdrop,
        .drawer-backdrop,
        .mobile-backdrop {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: none;
            background: rgba(3, 10, 15, 0.46);
            backdrop-filter: blur(6px);
        }

        .modal-backdrop.open,
        .drawer-backdrop.open,
        .mobile-backdrop.open {
            display: block;
        }

        .modal {
            position: fixed;
            left: 50%;
            top: 50%;
            z-index: 90;
            display: none;
            width: min(720px, calc(100vw - 32px));
            max-height: calc(100vh - 42px);
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--surface-solid);
            box-shadow: var(--shadow-lg);
            transform: translate(-50%, -50%);
        }

        .modal.open {
            display: flex;
            flex-direction: column;
            animation: modalIn 180ms var(--ease);
        }

        .modal-header,
        .modal-footer,
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title,
        .drawer-title {
            margin: 0;
            color: var(--heading);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.035em;
        }

        .modal-body {
            overflow-y: auto;
            padding: 18px;
        }

        .modal-footer {
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            border-bottom: 0;
            background: var(--surface-muted);
        }

        .detail-drawer {
            position: fixed;
            right: 0;
            top: 0;
            z-index: 90;
            display: flex;
            width: min(440px, 100vw);
            height: 100vh;
            flex-direction: column;
            border-left: 1px solid var(--border);
            background: var(--surface-solid);
            box-shadow: var(--shadow-lg);
            transform: translateX(105%);
            transition: transform 220ms var(--ease);
        }

        .detail-drawer.open {
            transform: translateX(0);
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }

        .toast-region {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 120;
            display: grid;
            gap: 10px;
        }

        .toast {
            display: flex;
            width: min(360px, calc(100vw - 28px));
            align-items: flex-start;
            gap: 10px;
            padding: 13px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            border-radius: 15px;
            background: var(--surface-solid);
            box-shadow: var(--shadow-lg);
            animation: toastIn 180ms var(--ease);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.error { border-left-color: var(--error); }
        .toast.info { border-left-color: var(--info); }

        .empty-state {
            display: grid;
            justify-items: center;
            gap: 10px;
            padding: 38px 18px;
            color: var(--muted);
            text-align: center;
        }

        .empty-illustration {
            width: 128px;
            height: 96px;
        }

        .tooltip {
            position: relative;
        }

        .tooltip::after {
            position: absolute;
            left: 50%;
            bottom: calc(100% + 8px);
            z-index: 70;
            width: max-content;
            max-width: 220px;
            padding: 7px 9px;
            border-radius: 9px;
            background: #061317;
            color: #ffffff;
            content: attr(data-tooltip);
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 4px);
            transition: opacity 160ms var(--ease), transform 160ms var(--ease);
        }

        .tooltip:hover::after {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .mobile-only {
            display: none;
        }

        .mt-16 { margin-top: 16px; }
        .mt-20 { margin-top: 20px; }
        .mb-0 { margin-bottom: 0; }
        .text-muted { color: var(--muted); }
        .text-faint { color: var(--faint); }
        .nowrap { white-space: nowrap; }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(-6px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -48%) scale(0.98); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1180px) {
            .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid-wide,
            .profile-hero { grid-template-columns: 1fr; }
            .system-pill { display: none; }
        }

        @media (max-width: 860px) {
            .app-shell.sidebar-collapsed .sidebar,
            .sidebar {
                position: fixed;
                transform: translateX(-105%);
                width: min(286px, calc(100vw - 48px));
            }

            body.nav-open .sidebar {
                transform: translateX(0);
            }

            .mobile-backdrop.open {
                z-index: 25;
            }

            .workspace {
                width: 100%;
            }

            .mobile-menu {
                display: inline-flex;
            }

            .global-search {
                display: none;
            }

            .topbar {
                padding: 0 14px;
            }

            .main-content {
                padding: 20px 14px;
            }

            .main-footer {
                flex-direction: column;
                padding: 0 14px 22px;
            }

            .page-hero {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .toolbar-actions,
            .toolbar-controls,
            .field-inline {
                width: 100%;
            }

            .toolbar-actions .btn,
            .toolbar-actions .dropdown-wrap,
            .toolbar-actions .dropdown-wrap .btn {
                width: 100%;
            }

            .mobile-only {
                display: inline-flex;
            }
        }

        @media (max-width: 640px) {
            .grid-2,
            .grid-3,
            .grid-4,
            .form-grid,
            .donut-wrap {
                grid-template-columns: 1fr;
            }

            .profile-main {
                align-items: flex-start;
                flex-direction: column;
            }

            .page-actions .btn,
            .page-actions .dropdown-wrap,
            .page-actions .dropdown-wrap .btn {
                width: 100%;
            }

            .topbar-actions .dropdown-wrap:nth-of-type(1) {
                display: none;
            }

            .toast-region {
                right: 14px;
                bottom: 14px;
                left: 14px;
            }

            .toast {
                width: 100%;
            }

            .table-footer {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell" id="appShell">
        <aside class="sidebar" id="sidebar" aria-label="主导航">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">T</div>

                    <span class="brand-title">TeavenCDN</span>
                    <span class="brand-subtitle">SaaS Console</span>
                </div>
                <button class="icon-btn compact sidebar-head-action tooltip" type="button" data-action="toggle-sidebar-collapse" data-tooltip="折叠导航" aria-label="折叠导航">
                    <i class="ri-side-bar-line" aria-hidden="true"></i>
                </button>
            </div>
            <nav class="nav-menu" aria-label="后台模块">
                <div>
                    <div class="nav-section-title">工作台</div>
                    <div class="nav-group">
                        <button class="nav-item active" type="button" data-page="dashboard"><i class="ri-dashboard-3-line" aria-hidden="true"></i><span class="nav-label">仪表盘</span></button>
                        <button class="nav-item" type="button" data-page="resources"><i class="ri-box-3-line" aria-hidden="true"></i><span class="nav-label">资源管理</span><span class="nav-badge">18</span></button>
                        <button class="nav-item" type="button" data-page="analytics"><i class="ri-line-chart-line" aria-hidden="true"></i><span class="nav-label">访问分析</span></button>
                    </div>
                </div>
                <div>
                    <div class="nav-section-title">平台</div>
                    <div class="nav-group">
                        <button class="nav-item" type="button" data-page="api"><i class="ri-terminal-box-line" aria-hidden="true"></i><span class="nav-label">API 管理</span></button>
                        <button class="nav-item" type="button" data-page="user"><i class="ri-user-3-line" aria-hidden="true"></i><span class="nav-label">用户中心</span></button>
                        <button class="nav-item" type="button" data-page="access"><i class="ri-shield-keyhole-line" aria-hidden="true"></i><span class="nav-label">权限管理</span></button>
                        <button class="nav-item" type="button" data-page="tickets"><i class="ri-customer-service-2-line" aria-hidden="true"></i><span class="nav-label">工单中心</span><span class="nav-badge">3</span></button>
                    </div>
                </div>

                    <div class="nav-section-title">系统</div>

                        <button class="nav-item" type="button" data-page="logs"><i class="ri-file-list-3-line" aria-hidden="true"></i><span class="nav-label">日志中心</span></button>
                        <button class="nav-item" type="button" data-page="settings"><i class="ri-settings-3-line" aria-hidden="true"></i><span class="nav-label">系统设置</span></button>
                    </div>
                </div>
            </nav>
            <section class="sidebar-profile" aria-label="当前账号">
                <div class="avatar" aria-hidden="true">茶</div>
                <div class="sidebar-profile-copy">
                    <div class="sidebar-profile-name">茶屿管理员</div>
                    <div class="sidebar-profile-role">Owner Account</div>
                </div>
                <button class="icon-btn compact" type="button" data-page="user" aria-label="进入用户中心"><i class="ri-arrow-right-line" aria-hidden="true"></i></button>
            </section>
        </aside>

        <div class="mobile-backdrop" id="mobileBackdrop" data-action="close-mobile-nav" aria-hidden="true"></div>

        <div class="workspace">
            <header class="topbar">
                <button class="icon-btn mobile-menu" type="button" data-action="open-mobile-nav" aria-label="打开导航"><i class="ri-menu-line" aria-hidden="true"></i></button>
                <div class="breadcrumbs" id="breadcrumbs" aria-label="面包屑导航"></div>
                <div class="topbar-actions">

                        <i class="ri-search-line" aria-hidden="true"></i>
                        <input id="globalSearch" type="search" placeholder="搜索资源、日志或 API Key" autocomplete="off">
                    </div>
                    <div class="system-pill"><span class="pulse-dot"></span> 边缘节点正常</div>
                    <button class="icon-btn tooltip" type="button" id="themeToggle" data-action="toggle-theme" data-tooltip="切换明暗模式" aria-label="切换明暗模式"><i class="ri-moon-line" aria-hidden="true"></i></button>
                    <div class="dropdown-wrap">
                        <button class="icon-btn tooltip" type="button" data-action="toggle-dropdown" data-target="notificationMenu" data-tooltip="通知中心" aria-label="通知中心"><i class="ri-notification-3-line" aria-hidden="true"></i></button>

                        <div class="dropdown-panel" id="profileMenu" role="menu">

            <main class="main-content" id="mainContent" tabindex="-1"></main>

    </div>

    <div class="modal-backdrop" id="modalBackdrop" data-action="close-modal" aria-hidden="true"></div>
    <section class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-header">
            <div>
                <h2 class="modal-title" id="modalTitle">新建资源</h2>
                <div class="secondary-text" id="modalSubtitle">Create Resource</div>
            </div>
            <button class="icon-btn compact" type="button" data-action="close-modal" aria-label="关闭弹窗"><i class="ri-close-line" aria-hidden="true"></i></button>
        </header>
        <div class="modal-body" id="modalBody"></div>
        <footer class="modal-footer" id="modalFooter"></footer>
    </section>

    <div class="drawer-backdrop" id="drawerBackdrop" data-action="close-drawer" aria-hidden="true"></div>
    <aside class="detail-drawer" id="detailDrawer" aria-labelledby="drawerTitle">
        <header class="drawer-header">
            <div>
                <h2 class="drawer-title" id="drawerTitle">资源详情</h2>
                <div class="secondary-text">Resource Detail</div>
            </div>
            <button class="icon-btn compact" type="button" data-action="close-drawer" aria-label="关闭详情"><i class="ri-close-line" aria-hidden="true"></i></button>
        </header>
        <div class="drawer-body" id="drawerBody"></div>
    </aside>

    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

    <script>

                const matchType = table.type === 'all' || item.type === table.type;
                const matchDate = !table.date || item.created >= table.date;
                return matchKeyword && matchStatus && matchType && matchDate;
            });
            rows.sort((a, b) => {
                const key = table.sortKey;
                const aValue = a[key];
                const bValue = b[key];
                const result = typeof aValue === 'number' ? aValue - bValue : String(aValue).localeCompare(String(bValue), 'zh-CN');
                return table.sortDir === 'asc' ? result : -result;
            });
            return rows;
        }

                    <label class="form-field"><span class="form-label">版本</span><select class="select" id="packageVersion"><option>latest</option><option>3.5.16</option><option>1.0.0</option></select><p class="help-text">默认拉取 latest。</p></label>
                    <div class="form-field full"><span class="form-label">来源类型</span><div class="choice-row"><label class="choice"><input type="radio" name="resourceSource" value="npm" checked> npm 转存</label><label class="choice"><input type="radio" name="resourceSource" value="upload"> 手动上传</label><label class="choice"><input type="radio" name="resourceSource" value="mirror"> 镜像资源</label></div></div>
                    <label class="form-field"><span class="form-label">缓存策略</span><select class="select"><option>标准缓存 30 天</option><option>长期缓存 365 天</option><option>调试缓存 1 小时</option></select></label>
                    <label class="form-field"><span class="form-label">上线日期</span><input class="input" type="date" value="2026-06-20"></label>
                    <div class="form-field full"><span class="form-label">发布域名</span><div class="choice-row"><label class="choice"><input type="checkbox" checked> 国内 CDN</label><label class="choice"><input type="checkbox" checked> 海外 CDN</label><label class="choice"><input type="checkbox"> 预览域名</label></div></div>
                    <div class="form-field full"><div class="switch-row"><div><div class="primary-text">自动识别入口文件</div><div class="secondary-text">按 default、min.js、dist、umd、browser 优先级匹配。</div></div><label class="switch"><input type="checkbox" checked><span></span></label></div></div>
                    <label class="form-field full"><span class="form-label">备注</span><textarea class="textarea" placeholder="填写用途、负责人或风险说明"></textarea></label>
                </form>
            `, `<button class="btn" type="button" data-action="close-modal">取消</button><button class="btn primary" type="button" data-action="submit-resource">创建资源</button>`);
        }

        function openApiKeyModal() {
            openModal('创建 API Key', 'Create API Key', `
                <form class="form-grid" id="apiKeyForm">
                    <label class="form-field full"><span class="form-label">Key 名称 <span class="required">*</span></span><input class="input" value="Production Deploy Key"></label>
                    <label class="form-field"><span class="form-label">权限范围</span><select class="select"><option>读写资源</option><option>只读分析</option><option>仅刷新缓存</option></select></label>
                    <label class="form-field"><span class="form-label">过期时间</span><input class="input" type="date" value="2026-09-20"></label>
                    <div class="form-field full"><span class="form-label">允许操作</span><div class="choice-row"><label class="choice"><input type="checkbox" checked> 搜索</label><label class="choice"><input type="checkbox" checked> 转存</label><label class="choice"><input type="checkbox"> 删除</label></div></div>
                </form>
            `, `<button class="btn" type="button" data-action="close-modal">取消</button><button class="btn primary" type="button" data-action="submit-api-key">创建 Key</button>`);
        }

        function openModal(title, subtitle, body, footer) {
            $('#modalTitle').textContent = title;
            $('#modalSubtitle').textContent = subtitle;
            $('#modalBody').innerHTML = body;
            $('#modalFooter').innerHTML = footer;
            $('#modalBackdrop').classList.add('open');
            $('#modal').classList.add('open');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            $('#modalBackdrop').classList.remove('open');
            $('#modal').classList.remove('open');
            document.body.classList.remove('modal-open');
        }

        function submitResource() {
            const field = $('[data-field="packageName"]');
            const input = $('#packageName');
            const value = input.value.trim();
            const valid = /^[a-z0-9@/_-]{2,64}$/i.test(value);
            field.classList.toggle('invalid', !valid);
            if (!valid) return;
            resources.unshift({ id: `pkg-${Date.now()}`, name: value, version: $('#packageVersion').value, file: 'dist/index.min.js', type: $('[name="resourceSource"]:checked').value, size: '32 KB', bytes: 32768, status: 'syncing', requests: 0, hitRate: 0, created: '2026-06-20', owner: '茶屿', path: `/npm/${value}/dist/index.min.js`, region: 'CN + Global' });
            closeModal();
            state.resources.page = 1;
            if (state.page === 'resources') renderPage('resources');
            showToast('资源已加入同步队列', 'success');
        }

        function openResourceDetail(id) {
            const item = resources.find(resource => resource.id === id);
            if (!item) return;
            $('#drawerTitle').textContent = item.name;
            $('#drawerBody').innerHTML = `
                <div class="resource-cell"><span class="resource-icon">${item.name.slice(0, 1).toUpperCase()}</span><div><div class="primary-text">${item.name}@${item.version}</div><div class="secondary-text mono">${item.file}</div></div></div>
                <div class="grid grid-2 mt-16">${metricCard('请求量', formatNumber(item.requests), '近 24 小时', 'ri-pulse-line')}${metricCard('命中率', `${item.hitRate}%`, item.region, 'ri-speed-up-line')}</div>
                <section class="card mt-16"><div class="card-header"><div><h3 class="card-title">资源信息</h3><div class="card-subtitle">Metadata</div></div>${statusBadge(item.status)}</div><div class="list-card"><div class="list-item"><span>路径</span><span class="mono secondary-text">${item.path}</span></div><div class="list-item"><span>大小</span><strong>${item.size}</strong></div><div class="list-item"><span>负责人</span><strong>${item.owner}</strong></div><div class="list-item"><span>创建时间</span><strong>${item.created}</strong></div></div></section>
                <div class="inline-actions mt-16"><button class="btn primary" type="button" data-action="copy-link" data-id="${item.id}"><i class="ri-file-copy-line" aria-hidden="true"></i>复制链接</button><button class="btn" type="button" data-action="show-demo-toast"><i class="ri-refresh-line" aria-hidden="true"></i>刷新缓存</button></div>
            `;
            $('#drawerBackdrop').classList.add('open');
            $('#detailDrawer').classList.add('open');
            document.body.classList.add('drawer-open');
        }

        function closeDrawer() {
            $('#drawerBackdrop').classList.remove('open');
            $('#detailDrawer').classList.remove('open');
            document.body.classList.remove('drawer-open');
        }

        function copyResourceLink(id) {
            const item = resources.find(resource => resource.id === id);
            if (!item) return;
            const url = `https://cdn.teaven.cn${item.path}`;
            if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => undefined);
            showToast('CDN 链接已复制到剪贴板', 'success');
        }

        function validateSettings() {
            const field = $('[data-field="cdnDomain"]');
            const input = $('#settingCdnDomain');
            if (!field || !input) {
                showToast('当前设置页已保存', 'success');
                return;
            }
            const valid = /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(input.value.trim());
            field.classList.toggle('invalid', !valid);
            showToast(valid ? '系统设置已保存' : '请修正表单中的错误提示', valid ? 'success' : 'error');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const icon = type === 'success' ? 'ri-checkbox-circle-line' : type === 'error' ? 'ri-close-circle-line' : type === 'warning' ? 'ri-error-warning-line' : 'ri-information-line';
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="${icon}" aria-hidden="true"></i><div><div class="primary-text">${message}</div><div class="secondary-text">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div></div>`;
            $('#toastRegion').appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        function closeDropdowns(exceptId) {
            $$('.dropdown-panel.open').forEach(panel => {
                if (panel.id !== exceptId) panel.classList.remove('open');
            });
        }

        function toggleDropdown(id) {
            const panel = document.getElementById(id);
            if (!panel) return;
            const isOpen = panel.classList.contains('open');
            closeDropdowns(id);
            panel.classList.toggle('open', !isOpen);
        }

        document.addEventListener('click', event => {
            const control = event.target.closest('[data-action], [data-page]');
            if (!control) {
                if (!event.target.closest('.dropdown-wrap')) closeDropdowns();
                return;
            }
            if (control.dataset.page) {
                document.body.classList.remove('nav-open');
                $('#mobileBackdrop').classList.remove('open');
                renderPage(control.dataset.page);
                return;
            }
            const action = control.dataset.action;
            if (control.disabled) return;
            if (action === 'toggle-sidebar-collapse') {
                $('#appShell').classList.toggle('sidebar-collapsed');
                localStorage.setItem('teaven-sidebar', $('#appShell').classList.contains('sidebar-collapsed') ? 'collapsed' : 'expanded');
            }
            if (action === 'open-mobile-nav') { document.body.classList.add('nav-open'); $('#mobileBackdrop').classList.add('open'); }
            if (action === 'close-mobile-nav') { document.body.classList.remove('nav-open'); $('#mobileBackdrop').classList.remove('open'); }
            if (action === 'toggle-theme') toggleTheme();
            if (action === 'toggle-dropdown') toggleDropdown(control.dataset.target);
            if (action === 'open-add-resource') openAddResourceModal();
            if (action === 'open-api-key-modal') openApiKeyModal();
            if (action === 'close-modal') closeModal();
            if (action === 'submit-resource') submitResource();
            if (action === 'submit-api-key') { closeModal(); showToast('API Key 已创建，请妥善保存', 'success'); }
            if (action === 'open-resource-detail') openResourceDetail(control.dataset.id);
            if (action === 'close-drawer') closeDrawer();
            if (action === 'copy-link') copyResourceLink(control.dataset.id);
            if (action === 'validate-settings') validateSettings();
            if (action === 'show-demo-toast') showToast('演示页面已响应操作', 'info');
            if (action === 'export-table') showToast('已生成模拟导出任务', 'success');
            if (action === 'set-tab') { state.tabs[control.dataset.tabPage] = control.dataset.tab; renderPage(state.page); }
            if (action === 'sort-resource') {
                const key = control.dataset.key;
                state.resources.sortDir = state.resources.sortKey === key && state.resources.sortDir === 'asc' ? 'desc' : 'asc';
                state.resources.sortKey = key;
                renderResourceTable();
            }
            if (action === 'change-page') { state.resources.page = Number(control.dataset.pageNumber); renderResourceTable(); }
            if (action === 'toggle-select-all') {
                const rows = filteredResources().slice((state.resources.page - 1) * state.resources.pageSize, state.resources.page * state.resources.pageSize);
                rows.forEach(row => control.checked ? state.resources.selected.add(row.id) : state.resources.selected.delete(row.id));
                renderResourceTable();
            }
            if (action === 'toggle-resource') {
                control.checked ? state.resources.selected.add(control.dataset.id) : state.resources.selected.delete(control.dataset.id);
                renderResourceTable();
            }
            if (action === 'batch-enable' || action === 'batch-refresh' || action === 'batch-delete') {
                const count = state.resources.selected.size;
                showToast(count ? `已处理 ${count} 个选中资源` : '请先选择资源', count ? 'success' : 'warning');
                closeDropdowns();
            }
        });

        document.addEventListener('input', event => {
            if (event.target.id === 'resourceSearch') {
                state.resources.search = event.target.value;
                state.resources.page = 1;
                renderResourceTable();
            }
        });

        document.addEventListener('change', event => {
            if (event.target.id === 'resourceStatusFilter') { state.resources.status = event.target.value; state.resources.page = 1; renderResourceTable(); }
            if (event.target.id === 'resourceTypeFilter') { state.resources.type = event.target.value; state.resources.page = 1; renderResourceTable(); }
            if (event.target.id === 'resourceDateFilter') { state.resources.date = event.target.value; state.resources.page = 1; renderResourceTable(); }
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape') { closeModal(); closeDrawer(); closeDropdowns(); document.body.classList.remove('nav-open'); $('#mobileBackdrop').classList.remove('open'); }
            if (event.key === 'Enter' && event.target.id === 'globalSearch') {
                state.resources.search = event.target.value.trim();
                renderPage('resources');
                showToast('已在资源管理中执行全局搜索', 'info');
            }
        });

        function init() {
            initTheme();
            if (localStorage.getItem('teaven-sidebar') === 'collapsed') $('#appShell').classList.add('sidebar-collapsed');
            renderPage('dashboard');
        }

        init();
    </script>
</body>
</html>
