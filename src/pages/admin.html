<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>TeavenCDN 管理后台</title>
    <!-- Remix Icon, Apache-2.0 License, loaded from BootCDN for mainland China accessibility. -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            color-scheme: light;
            --bg: #f5fafb;
            --surface: rgba(255, 255, 255, 0.86);
            --surface-solid: #ffffff;
            --surface-muted: #eef7f8;
            --surface-hover: #e6f2f3;
            --heading: #061923;
            --text: #17313d;
            --muted: #657c8a;
            --faint: #91a7b2;
            --border: rgba(95, 124, 137, 0.22);
            --border-strong: rgba(65, 91, 104, 0.28);
            --primary: #0f766e;
            --primary-rgb: 15, 118, 110;
            --cyan: #0891b2;
            --cyan-rgb: 8, 145, 178;
            --success: #16a34a;
            --success-rgb: 22, 163, 74;
            --warning: #d97706;
            --warning-rgb: 217, 119, 6;
            --error: #dc2626;
            --error-rgb: 220, 38, 38;
            --info: #0284c7;
            --info-rgb: 2, 132, 199;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06), 0 1px 8px rgba(15, 118, 110, 0.04);
            --shadow-md: 0 12px 32px rgba(15, 23, 42, 0.09);
            --shadow-lg: 0 26px 80px rgba(15, 23, 42, 0.18);
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 22px;
            --sidebar-width: 274px;
            --sidebar-collapsed: 84px;
            --topbar-height: 72px;
            --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --bg: #071115;
            --surface: rgba(12, 25, 30, 0.8);
            --surface-solid: #0d1b20;
            --surface-muted: #102229;
            --surface-hover: #162d34;
            --heading: #f3fbfc;
            --text: #d7e6eb;
            --muted: #96abb5;
            --faint: #6f8791;
            --border: rgba(148, 179, 190, 0.18);
            --border-strong: rgba(148, 179, 190, 0.26);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2), 0 1px 12px rgba(20, 184, 166, 0.04);
            --shadow-md: 0 18px 46px rgba(0, 0, 0, 0.28);
            --shadow-lg: 0 34px 92px rgba(0, 0, 0, 0.44);
        }

        html { background: var(--bg); }

        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, rgba(var(--primary-rgb), 0.13), transparent 34rem), var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            transition: background-color 220ms var(--ease), color 220ms var(--ease);
        }

        body.modal-open,
        body.drawer-open,
        body.nav-open { overflow: hidden; }

        button, input, select, textarea { font: inherit; }
        button { border: 0; }
        a { color: inherit; }

        .app-shell { display: flex; min-height: 100vh; }

        .sidebar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            width: var(--sidebar-width);
            height: 100vh;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.08), transparent 18rem), var(--surface);
            backdrop-filter: blur(18px);
            transition: width 220ms var(--ease), transform 220ms var(--ease);
        }

        .app-shell.sidebar-collapsed .sidebar { width: var(--sidebar-collapsed); }

        .brand {
            display: flex;
            min-height: var(--topbar-height);
            align-items: center;
            gap: 12px;
            padding: 0 18px;
            border-bottom: 1px solid var(--border);
        }

        .brand-mark {
            display: grid;
            width: 40px;
            height: 40px;
            flex: 0 0 40px;
            place-items: center;
            border: 1px solid rgba(var(--primary-rgb), 0.26);
            border-radius: 14px;
            background: rgba(var(--primary-rgb), 0.12);
            color: var(--primary);
            font-size: 18px;
            font-weight: 950;
            letter-spacing: -0.04em;
        }

        .brand-copy { min-width: 0; transition: opacity 180ms var(--ease), transform 180ms var(--ease); }
        .brand-title { display: block; color: var(--heading); font-size: 17px; font-weight: 900; letter-spacing: -0.03em; white-space: nowrap; }
        .brand-subtitle, .eyebrow, .english { color: var(--faint); font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
        .sidebar-head-action { margin-left: auto; }

        .app-shell.sidebar-collapsed .brand-copy,
        .app-shell.sidebar-collapsed .nav-section-title,
        .app-shell.sidebar-collapsed .nav-label,
        .app-shell.sidebar-collapsed .nav-badge,
        .app-shell.sidebar-collapsed .sidebar-session-copy,
        .app-shell.sidebar-collapsed .sidebar-session .icon-btn {
            pointer-events: none;
            opacity: 0;
            transform: translateX(-6px);
        }

        .nav-menu {
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            padding: 18px 12px;
        }

        .nav-section-title {
            padding: 0 12px 6px;
            color: var(--faint);
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: opacity 180ms var(--ease), transform 180ms var(--ease);
        }

        .nav-group { display: grid; gap: 5px; }

        .nav-item {
            display: flex;
            width: 100%;
            min-height: 42px;
            align-items: center;
            gap: 12px;
            padding: 0 12px;
            border-radius: 13px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            text-align: left;
            transition: background-color 180ms var(--ease), color 180ms var(--ease);
        }

        .nav-item i { display: grid; width: 22px; height: 22px; flex: 0 0 22px; place-items: center; font-size: 19px; }
        .nav-item:hover { background: rgba(var(--primary-rgb), 0.08); color: var(--heading); }
        .nav-item.active { background: rgba(var(--primary-rgb), 0.12); color: var(--primary); box-shadow: inset 0 0 0 1px rgba(var(--primary-rgb), 0.16); }
        .nav-label { flex: 1; overflow: hidden; color: inherit; font-size: 14px; font-weight: 800; text-overflow: ellipsis; white-space: nowrap; transition: opacity 180ms var(--ease), transform 180ms var(--ease); }
        .nav-badge { min-width: 24px; border-radius: 999px; background: rgba(var(--cyan-rgb), 0.12); color: var(--cyan); font-size: 11px; font-weight: 850; line-height: 20px; text-align: center; transition: opacity 180ms var(--ease), transform 180ms var(--ease); }

        .sidebar-session {
            display: flex;
            align-items: center;
            gap: 11px;
            margin: 0 12px 14px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(var(--primary-rgb), 0.06);
        }

        .avatar {
            display: grid;
            width: 36px;
            height: 36px;
            flex: 0 0 36px;
            place-items: center;
            border-radius: 999px;
            background: rgba(var(--primary-rgb), 0.13);
            color: var(--primary);
            font-weight: 950;
        }

        .sidebar-session-copy { flex: 1; min-width: 0; transition: opacity 180ms var(--ease), transform 180ms var(--ease); }
        .sidebar-session-name { overflow: hidden; color: var(--heading); font-size: 13px; font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-session-role { color: var(--faint); font-size: 12px; }

        .workspace { display: flex; min-width: 0; flex: 1; flex-direction: column; }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            min-height: var(--topbar-height);
            align-items: center;
            gap: 18px;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(18px);
        }

        .mobile-menu { display: none; }

        .breadcrumbs { display: flex; min-width: 0; flex: 1; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
        .breadcrumbs span:last-of-type { overflow: hidden; color: var(--heading); font-weight: 850; text-overflow: ellipsis; white-space: nowrap; }
        .topbar-actions { display: flex; align-items: center; gap: 10px; }

        .global-search { position: relative; width: min(30vw, 330px); }
        .global-search i { position: absolute; left: 12px; top: 50%; color: var(--faint); transform: translateY(-50%); }
        .global-search input { width: 100%; height: 40px; padding: 0 12px 0 38px; border: 1px solid var(--border); border-radius: 999px; outline: none; background: var(--surface-muted); color: var(--text); transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease), background-color 180ms var(--ease); }

        .input:focus, .select:focus, .textarea:focus, .global-search input:focus { border-color: rgba(var(--primary-rgb), 0.68); background: var(--surface-solid); box-shadow: 0 0 0 4px rgba(var(--primary-rgb), 0.12); }

        .system-pill { display: inline-flex; height: 36px; align-items: center; gap: 8px; padding: 0 12px; border: 1px solid var(--border); border-radius: 999px; background: var(--surface-muted); color: var(--muted); font-size: 12px; font-weight: 850; white-space: nowrap; }
        .system-pill.ok { border-color: rgba(var(--success-rgb), 0.22); background: rgba(var(--success-rgb), 0.08); color: var(--success); }
        .system-pill.error { border-color: rgba(var(--error-rgb), 0.22); background: rgba(var(--error-rgb), 0.08); color: var(--error); }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 6px rgba(var(--success-rgb), 0.12); }

        .main-content { width: 100%; max-width: 1560px; margin: 0 auto; padding: 28px; }
        .main-footer { display: flex; justify-content: space-between; gap: 16px; padding: 0 28px 28px; color: var(--faint); font-size: 12px; }

        .page-hero { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
        .page-title { margin: 5px 0 4px; color: var(--heading); font-size: clamp(26px, 3vw, 36px); font-weight: 950; letter-spacing: -0.055em; line-height: 1.08; }
        .page-description { max-width: 760px; margin: 0; color: var(--muted); font-size: 14px; }
        .page-actions, .inline-actions, .toolbar-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .grid { display: grid; gap: 16px; }
        .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .grid-wide { grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.9fr); }

        .card, .stat-card, .toolbar, .table-shell { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); box-shadow: var(--shadow-sm); backdrop-filter: blur(18px); }
        .card, .table-shell { overflow: hidden; }
        .card { padding: 18px; }
        .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
        .card-title { margin: 0; color: var(--heading); font-size: 16px; font-weight: 900; letter-spacing: -0.02em; }
        .card-subtitle { margin-top: 2px; color: var(--faint); font-size: 12px; }

        .stat-card { position: relative; overflow: hidden; padding: 18px; }
        .stat-card::after { position: absolute; right: -48px; top: -64px; width: 160px; height: 160px; border-radius: 999px; background: radial-gradient(circle, rgba(var(--primary-rgb), 0.14), transparent 68%); content: ""; pointer-events: none; }
        .stat-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .stat-icon, .icon-box { display: grid; width: 40px; height: 40px; place-items: center; border-radius: 14px; background: rgba(var(--primary-rgb), 0.1); color: var(--primary); font-size: 20px; }
        .stat-label { color: var(--muted); font-size: 13px; font-weight: 850; }
        .stat-value { margin: 14px 0 5px; color: var(--heading); font-size: 29px; font-weight: 950; letter-spacing: -0.055em; }
        .stat-meta { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }

        .btn, .icon-btn, .pagination-btn, .tab-btn, .table-sort {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface-solid);
            color: var(--text);
            cursor: pointer;
            font-weight: 850;
            text-decoration: none;
            transition: transform 180ms var(--ease), background-color 180ms var(--ease), border-color 180ms var(--ease), color 180ms var(--ease), box-shadow 180ms var(--ease);
        }

        .btn { min-height: 40px; padding: 0 14px; font-size: 13px; }
        .btn:hover, .icon-btn:hover, .pagination-btn:hover, .tab-btn:hover, .table-sort:hover { border-color: rgba(var(--primary-rgb), 0.34); background: rgba(var(--primary-rgb), 0.08); color: var(--primary); }
        .btn:active, .icon-btn:active { transform: translateY(1px); }
        .btn.primary { border-color: rgba(var(--primary-rgb), 0.9); background: linear-gradient(180deg, rgba(var(--primary-rgb), 1), rgba(var(--primary-rgb), 0.9)); color: #ffffff; box-shadow: 0 12px 26px rgba(var(--primary-rgb), 0.22); }
        .btn.primary:hover { color: #ffffff; box-shadow: 0 14px 32px rgba(var(--primary-rgb), 0.28); }
        .btn.danger { border-color: rgba(var(--error-rgb), 0.25); background: rgba(var(--error-rgb), 0.08); color: var(--error); }
        .btn.small { min-height: 32px; padding: 0 10px; border-radius: 10px; font-size: 12px; }
        .btn.ghost { background: transparent; }
        .btn:disabled, .pagination-btn:disabled { cursor: not-allowed; opacity: 0.45; }
        .icon-btn { width: 40px; height: 40px; flex: 0 0 40px; padding: 0; border-radius: 13px; font-size: 18px; }
        .icon-btn.compact { width: 34px; height: 34px; flex-basis: 34px; border-radius: 11px; font-size: 16px; }

        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 999px; font-size: 12px; font-weight: 850; white-space: nowrap; }
        .badge.success { background: rgba(var(--success-rgb), 0.1); color: var(--success); }
        .badge.warning { background: rgba(var(--warning-rgb), 0.12); color: var(--warning); }
        .badge.error { background: rgba(var(--error-rgb), 0.1); color: var(--error); }
        .badge.info { background: rgba(var(--info-rgb), 0.1); color: var(--info); }
        .badge.neutral { background: var(--surface-muted); color: var(--muted); }

        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 16px; padding: 14px; }
        .toolbar-controls { display: flex; flex: 1; align-items: center; gap: 10px; flex-wrap: wrap; }
        .field-inline { position: relative; min-width: 190px; }
        .field-inline i { position: absolute; left: 12px; top: 50%; color: var(--faint); transform: translateY(-50%); }

        .input, .select, .textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; outline: none; background: var(--surface-solid); color: var(--text); transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease), background-color 180ms var(--ease); }
        .input, .select { height: 40px; padding: 0 12px; }
        .field-inline .input { padding-left: 38px; }
        .textarea { min-height: 92px; padding: 10px 12px; resize: vertical; }

        .table-shell { margin-top: 16px; }
        .table-scroll { width: 100%; overflow-x: auto; }
        table { width: 100%; min-width: 900px; border-collapse: collapse; }
        thead { background: var(--surface-muted); }
        th, td { padding: 13px 16px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
        th { color: var(--muted); font-size: 12px; font-weight: 950; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
        td { color: var(--text); font-size: 13px; }
        tbody tr { transition: background-color 160ms var(--ease); }
        tbody tr:hover { background: rgba(var(--primary-rgb), 0.05); }
        .table-sort { border: 0; background: transparent; color: inherit; font-size: 12px; font-weight: 950; letter-spacing: inherit; text-transform: inherit; }
        .table-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; }
        .pagination { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .pagination-btn { min-width: 34px; height: 34px; padding: 0 10px; border-radius: 10px; font-size: 12px; }
        .pagination-btn.active { border-color: rgba(var(--primary-rgb), 0.75); background: rgba(var(--primary-rgb), 0.13); color: var(--primary); }

        .resource-cell { display: flex; align-items: center; gap: 12px; }
        .resource-icon { display: grid; width: 38px; height: 38px; flex: 0 0 38px; place-items: center; border-radius: 13px; background: rgba(var(--primary-rgb), 0.1); color: var(--primary); font-weight: 950; }
        .primary-text { color: var(--heading); font-weight: 850; }
        .secondary-text { color: var(--faint); font-size: 12px; }
        .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }

        .tabs { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface-muted); }
        .tab-btn { min-height: 34px; padding: 0 12px; border-color: transparent; border-radius: 10px; background: transparent; color: var(--muted); font-size: 12px; }
        .tab-btn.active { background: var(--surface-solid); color: var(--primary); box-shadow: var(--shadow-sm); }

        .list-card { display: grid; gap: 10px; }
        .list-item { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 12px; border: 1px solid var(--border); border-radius: 15px; background: rgba(var(--primary-rgb), 0.035); }

        .timeline { display: grid; gap: 0; margin: 0; padding: 0; list-style: none; }
        .timeline-item { position: relative; display: grid; gap: 4px; padding: 0 0 18px 28px; border-left: 1px solid var(--border); }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-item::before { position: absolute; left: -6px; top: 4px; width: 11px; height: 11px; border: 3px solid var(--surface-solid); border-radius: 999px; background: var(--primary); content: ""; box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.12); }

        .chart-svg { width: 100%; height: 220px; overflow: visible; }
        .chart-grid-line { stroke: var(--border); stroke-width: 1; }
        .chart-line { fill: none; stroke: var(--primary); stroke-linecap: round; stroke-linejoin: round; stroke-width: 3; }
        .chart-area { fill: rgba(var(--primary-rgb), 0.13); }
        .bar-list { display: grid; gap: 13px; margin-top: 8px; }
        .bar-row { display: grid; grid-template-columns: minmax(80px, 110px) minmax(0, 1fr) 54px; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; }
        .bar-track { height: 10px; overflow: hidden; border-radius: 999px; background: var(--surface-muted); }
        .bar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.55), rgba(var(--primary-rgb), 0.95)); }

        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 15px; }
        .form-field { display: grid; gap: 7px; }
        .form-field.full { grid-column: 1 / -1; }
        .form-label { color: var(--heading); font-size: 13px; font-weight: 850; }
        .required { color: var(--error); }
        .help-text, .error-text { margin: 0; font-size: 12px; }
        .help-text { color: var(--faint); }
        .error-text { display: none; color: var(--error); }
        .form-field.invalid .input, .form-field.invalid .select, .form-field.invalid .textarea { border-color: rgba(var(--error-rgb), 0.65); box-shadow: 0 0 0 4px rgba(var(--error-rgb), 0.1); }
        .form-field.invalid .error-text { display: block; }

        .empty-state { display: grid; justify-items: center; gap: 10px; padding: 38px 18px; color: var(--muted); text-align: center; }
        .empty-illustration { width: 128px; height: 96px; }
        .notice { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--border); border-radius: 16px; background: var(--surface-muted); }
        .notice.error { border-color: rgba(var(--error-rgb), 0.22); background: rgba(var(--error-rgb), 0.07); }
        .notice.warning { border-color: rgba(var(--warning-rgb), 0.24); background: rgba(var(--warning-rgb), 0.08); }
        .notice.success { border-color: rgba(var(--success-rgb), 0.22); background: rgba(var(--success-rgb), 0.07); }

        .skeleton { position: relative; overflow: hidden; min-height: 100px; border-radius: 16px; background: var(--surface-muted); }
        .skeleton::after { position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent); content: ""; animation: shimmer 1.2s infinite; }

        .dropdown-wrap { position: relative; }
        .dropdown-panel { position: absolute; right: 0; top: calc(100% + 10px); z-index: 60; display: none; width: 300px; padding: 10px; border: 1px solid var(--border); border-radius: 18px; background: var(--surface-solid); box-shadow: var(--shadow-lg); }
        .dropdown-panel.open { display: block; animation: popIn 160ms var(--ease); }
        .dropdown-item { display: flex; width: 100%; align-items: center; gap: 10px; padding: 10px; border-radius: 12px; background: transparent; color: var(--text); cursor: pointer; text-align: left; }
        .dropdown-item:hover { background: var(--surface-muted); }

        .modal-backdrop, .drawer-backdrop, .mobile-backdrop { position: fixed; inset: 0; z-index: 80; display: none; background: rgba(3, 10, 15, 0.46); backdrop-filter: blur(6px); }
        .modal-backdrop.open, .drawer-backdrop.open, .mobile-backdrop.open { display: block; }
        .modal { position: fixed; left: 50%; top: 50%; z-index: 90; display: none; width: min(720px, calc(100vw - 32px)); max-height: calc(100vh - 42px); overflow: hidden; border: 1px solid var(--border); border-radius: 24px; background: var(--surface-solid); box-shadow: var(--shadow-lg); transform: translate(-50%, -50%); }
        .modal.open { display: flex; flex-direction: column; animation: modalIn 180ms var(--ease); }
        .modal-header, .modal-footer, .drawer-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
        .modal-title, .drawer-title { margin: 0; color: var(--heading); font-size: 18px; font-weight: 950; letter-spacing: -0.035em; }
        .modal-body { overflow-y: auto; padding: 18px; }
        .modal-footer { justify-content: flex-end; border-top: 1px solid var(--border); border-bottom: 0; background: var(--surface-muted); }
        .detail-drawer { position: fixed; right: 0; top: 0; z-index: 90; display: flex; width: min(460px, 100vw); height: 100vh; flex-direction: column; border-left: 1px solid var(--border); background: var(--surface-solid); box-shadow: var(--shadow-lg); transform: translateX(105%); transition: transform 220ms var(--ease); }
        .detail-drawer.open { transform: translateX(0); }
        .drawer-body { flex: 1; overflow-y: auto; padding: 18px; }

        .toast-region { position: fixed; right: 22px; bottom: 22px; z-index: 120; display: grid; gap: 10px; }
        .toast { display: flex; width: min(360px, calc(100vw - 28px)); align-items: flex-start; gap: 10px; padding: 13px; border: 1px solid var(--border); border-left: 4px solid var(--primary); border-radius: 15px; background: var(--surface-solid); box-shadow: var(--shadow-lg); animation: toastIn 180ms var(--ease); }
        .toast.success { border-left-color: var(--success); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.error { border-left-color: var(--error); }
        .toast.info { border-left-color: var(--info); }

        .tooltip { position: relative; }
        .tooltip::after { position: absolute; left: 50%; bottom: calc(100% + 8px); z-index: 70; width: max-content; max-width: 220px; padding: 7px 9px; border-radius: 9px; background: #061317; color: #ffffff; content: attr(data-tooltip); font-size: 12px; opacity: 0; pointer-events: none; transform: translate(-50%, 4px); transition: opacity 160ms var(--ease), transform 160ms var(--ease); }
        .tooltip:hover::after { opacity: 1; transform: translate(-50%, 0); }

        .mt-16 { margin-top: 16px; }
        .mt-20 { margin-top: 20px; }
        .mb-0 { margin-bottom: 0; }
        .text-muted { color: var(--muted); }
        .text-faint { color: var(--faint); }
        .nowrap { white-space: nowrap; }
        .hidden { display: none !important; }

        @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
        @keyframes popIn { from { opacity: 0; transform: translateY(-6px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes modalIn { from { opacity: 0; transform: translate(-50%, -48%) scale(0.98); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1180px) {
            .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid-wide { grid-template-columns: 1fr; }
            .system-pill { display: none; }
        }

        @media (max-width: 860px) {
            .app-shell.sidebar-collapsed .sidebar, .sidebar { position: fixed; transform: translateX(-105%); width: min(286px, calc(100vw - 48px)); }
            body.nav-open .sidebar { transform: translateX(0); }
            .mobile-backdrop.open { z-index: 25; }
            .workspace { width: 100%; }
            .mobile-menu { display: inline-flex; }
            .global-search { display: none; }
            .topbar { padding: 0 14px; }
            .main-content { padding: 20px 14px; }
            .main-footer { flex-direction: column; padding: 0 14px 22px; }
            .page-hero { flex-direction: column; align-items: stretch; }
            .toolbar { align-items: stretch; flex-direction: column; }
            .toolbar-actions, .toolbar-controls, .field-inline { width: 100%; }
            .toolbar-actions .btn, .toolbar-actions .dropdown-wrap, .toolbar-actions .dropdown-wrap .btn { width: 100%; }
        }

        @media (max-width: 640px) {
            .grid-2, .grid-3, .grid-4, .form-grid { grid-template-columns: 1fr; }
            .page-actions .btn, .page-actions .dropdown-wrap, .page-actions .dropdown-wrap .btn { width: 100%; }
            .topbar-actions .dropdown-wrap { display: none; }
            .toast-region { right: 14px; bottom: 14px; left: 14px; }
            .toast { width: 100%; }
            .table-footer { align-items: flex-start; flex-direction: column; }
            .list-item { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app-shell" id="appShell">
        <aside class="sidebar" id="sidebar" aria-label="主导航">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">T</div>
                <div class="brand-copy">
                    <span class="brand-title">TeavenCDN</span>
                    <span class="brand-subtitle">Worker Console</span>
                </div>
                <button class="icon-btn compact sidebar-head-action tooltip" type="button" data-action="toggle-sidebar-collapse" data-tooltip="折叠导航" aria-label="折叠导航">
                    <i class="ri-side-bar-line" aria-hidden="true"></i>
                </button>
            </div>
            <nav class="nav-menu" aria-label="后台模块">
                <div>
                    <div class="nav-section-title">业务</div>
                    <div class="nav-group">
                        <button class="nav-item active" type="button" data-page="dashboard"><i class="ri-dashboard-3-line" aria-hidden="true"></i><span class="nav-label">仪表盘</span></button>
                        <button class="nav-item" type="button" data-page="search"><i class="ri-search-2-line" aria-hidden="true"></i><span class="nav-label">搜索转存</span></button>
                        <button class="nav-item" type="button" data-page="packages"><i class="ri-box-3-line" aria-hidden="true"></i><span class="nav-label">资源管理</span><span class="nav-badge" id="resourceCountBadge">0</span></button>
                        <button class="nav-item" type="button" data-page="logs"><i class="ri-file-list-3-line" aria-hidden="true"></i><span class="nav-label">日志中心</span></button>
                    </div>
                </div>
                <div>
                    <div class="nav-section-title">账户</div>
                    <div class="nav-group">
                        <button class="nav-item" type="button" data-page="account"><i class="ri-user-settings-line" aria-hidden="true"></i><span class="nav-label">用户中心</span></button>
                    </div>
                </div>
            </nav>
            <section class="sidebar-session" aria-label="当前管理会话">
                <div class="avatar" aria-hidden="true"><i class="ri-key-2-line"></i></div>
                <div class="sidebar-session-copy">
                    <div class="sidebar-session-name" id="sidebarSessionName">未验证</div>
                    <div class="sidebar-session-role" id="sidebarSessionRole">Admin Token</div>
                </div>
                <button class="icon-btn compact" type="button" data-page="account" aria-label="进入用户中心"><i class="ri-arrow-right-line" aria-hidden="true"></i></button>
            </section>
        </aside>

        <div class="mobile-backdrop" id="mobileBackdrop" data-action="close-mobile-nav" aria-hidden="true"></div>

        <div class="workspace">
            <header class="topbar">
                <button class="icon-btn mobile-menu" type="button" data-action="open-mobile-nav" aria-label="打开导航"><i class="ri-menu-line" aria-hidden="true"></i></button>
                <div class="breadcrumbs" id="breadcrumbs" aria-label="面包屑导航"></div>
                <div class="topbar-actions">
                    <div class="global-search" role="search">
                        <i class="ri-search-line" aria-hidden="true"></i>
                        <input id="globalSearch" type="search" placeholder="搜索已入库资源" autocomplete="off">
                    </div>
                    <div class="system-pill" id="healthPill"><span class="pulse-dot"></span> 检查中</div>
                    <button class="icon-btn tooltip" type="button" id="themeToggle" data-action="toggle-theme" data-tooltip="切换明暗模式" aria-label="切换明暗模式"><i class="ri-moon-line" aria-hidden="true"></i></button>
                    <button class="icon-btn tooltip" type="button" data-action="refresh" data-tooltip="刷新真实数据" aria-label="刷新真实数据"><i class="ri-refresh-line" aria-hidden="true"></i></button>
                </div>
            </header>

            <main class="main-content" id="mainContent" tabindex="-1"></main>
            <footer class="main-footer">
                <span>TeavenCDN Console · 数据来自当前 Worker API 与本地管理会话</span>
                <span id="footerStatus">等待加载</span>
            </footer>
        </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" data-action="close-modal" aria-hidden="true"></div>
    <section class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-header">
            <div>
                <h2 class="modal-title" id="modalTitle">确认操作</h2>
                <div class="secondary-text" id="modalSubtitle">Confirmation</div>
            </div>
            <button class="icon-btn compact" type="button" data-action="close-modal" aria-label="关闭弹窗"><i class="ri-close-line" aria-hidden="true"></i></button>
        </header>
        <div class="modal-body" id="modalBody"></div>
        <footer class="modal-footer" id="modalFooter"></footer>
    </section>

    <div class="drawer-backdrop" id="drawerBackdrop" data-action="close-drawer" aria-hidden="true"></div>
    <aside class="detail-drawer" id="detailDrawer" aria-labelledby="drawerTitle">
        <header class="drawer-header">
            <div>
                <h2 class="drawer-title" id="drawerTitle">资源详情</h2>
                <div class="secondary-text">Package Record</div>
            </div>
            <button class="icon-btn compact" type="button" data-action="close-drawer" aria-label="关闭详情"><i class="ri-close-line" aria-hidden="true"></i></button>
        </header>
        <div class="drawer-body" id="drawerBody"></div>
    </aside>

    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

    <script>
        const $ = (selector, root = document) => root.querySelector(selector);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

        const pageMeta = {
            dashboard: { title: '仪表盘', english: 'Overview' },
            search: { title: '搜索转存', english: 'Search & Favorite' },
            packages: { title: '资源管理', english: 'Packages' },
            logs: { title: '日志中心', english: 'Audit Logs' },
            account: { title: '用户中心', english: 'Admin Session' }
        };

        const state = {
            page: 'dashboard',
            token: localStorage.getItem('admin_token') || '',
            loading: true,
            health: null,
            healthError: '',
            authError: '',
            lastLoadedAt: null,
            stats: null,
            packages: [],
            logs: [],
            logsTotal: 0,
            packageTable: {
                search: '',
                source: 'all',
                contentType: 'all',
                fromDate: '',
                sortKey: 'created_at',
                sortDir: 'desc',
                page: 1,
                pageSize: 8,
                selected: new Set()
            },
            logTable: {
                search: '',
                status: 'all',
                page: 1,
                pageSize: 20
            },
            search: {
                query: '',
                result: null,
                version: '',
                versionDetail: null,
                loading: false,
                error: ''
            }
        };

        class ApiError extends Error {
            constructor(message, status) {
                super(message);
                this.name = 'ApiError';
                this.status = status;
            }
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>'"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
        }

        function authHeaders() {
            return state.token ? { Authorization: `Bearer ${state.token}` } : {};
        }

        async function apiRequest(path, options = {}) {
            const headers = { ...authHeaders(), ...(options.headers || {}) };
            let body = options.body;
            if (body && typeof body !== 'string') {
                headers['Content-Type'] = 'application/json';
                body = JSON.stringify(body);
            }

            const response = await fetch(path, { ...options, headers, body });
            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json') ? await response.json().catch(() => ({})) : await response.text().catch(() => '');

            if (!response.ok) {
                const message = typeof payload === 'object' && payload && payload.error ? payload.error : `请求失败 (${response.status})`;
                throw new ApiError(message, response.status);
            }

            return payload;
        }

        function formatNumber(value) {
            const number = Number(value || 0);
            return new Intl.NumberFormat('zh-CN').format(number);
        }

        function formatBytes(value) {
            const bytes = Number(value || 0);
            if (bytes >= 1073741824) return `${(bytes / 1073741824).toFixed(1)} GB`;
            if (bytes >= 1048576) return `${(bytes / 1048576).toFixed(1)} MB`;
            if (bytes >= 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            return `${bytes} B`;
        }

        function parseDate(value) {
            if (!value) return null;
            const text = String(value);
            const date = new Date(/[zZ]|[+-]\d{2}:?\d{2}$/.test(text) ? text : `${text}Z`);
            return Number.isNaN(date.getTime()) ? null : date;
        }

        function formatDateTime(value) {
            const date = parseDate(value);
            if (!date) return '-';
            return new Intl.DateTimeFormat('zh-CN', { dateStyle: 'medium', timeStyle: 'short' }).format(date);
        }

        function formatDate(value) {
            const date = parseDate(value);
            if (!date) return '-';
            return new Intl.DateTimeFormat('zh-CN', { month: '2-digit', day: '2-digit' }).format(date);
        }

        function packageDisplayName(pkg) {
            return `${pkg.name || '-'}@${pkg.version || '-'}`;
        }

        function sourceLabel(source) {
            return source || '未记录';
        }

        function logStatusBadge(status) {
            const normalized = String(status || 'success').toLowerCase();
            if (normalized === 'success') return '<span class="badge success"><i class="ri-checkbox-circle-line" aria-hidden="true"></i>成功</span>';
            if (normalized === 'error' || normalized === 'failed') return '<span class="badge error"><i class="ri-close-circle-line" aria-hidden="true"></i>失败</span>';
            return `<span class="badge info"><i class="ri-information-line" aria-hidden="true"></i>${escapeHtml(status || '未知')}</span>`;
        }

        function pageHero(title, english, description, actions = '') {
            return `
                <section class="page-hero">
                    <div>
                        <div class="eyebrow">${english}</div>
                        <h1 class="page-title">${title}</h1>
                        <p class="page-description">${description}</p>
                    </div>
                    <div class="page-actions">${actions}</div>
                </section>
            `;
        }

        function metricCard(label, value, meta, icon) {
            return `
                <article class="stat-card">
                    <div class="stat-top">
                        <span class="stat-label">${label}</span>
                        <span class="stat-icon"><i class="${icon}" aria-hidden="true"></i></span>
                    </div>
                    <div class="stat-value">${value}</div>
                    <div class="stat-meta">${meta}</div>
                </article>
            `;
        }

        function emptyState(title, description) {
            return `
                <div class="empty-state">
                    <svg class="empty-illustration" viewBox="0 0 160 112" role="img" aria-label="空状态插图">
                        <rect x="24" y="24" width="112" height="64" rx="18" fill="none" stroke="var(--border-strong)" stroke-width="2"></rect>
                        <path d="M48 60h64M58 74h44" stroke="var(--primary)" stroke-width="4" stroke-linecap="round"></path>
                        <circle cx="114" cy="38" r="7" fill="rgba(15,118,110,0.22)"></circle>
                    </svg>
                    <div class="primary-text">${escapeHtml(title)}</div>
                    <p class="text-muted mb-0">${escapeHtml(description)}</p>
                </div>
            `;
        }

        function authNotice() {
            if (state.token) {
                const message = state.authError || '真实业务接口暂时不可用，请检查 Worker、D1、R2 或 ADMIN_TOKEN 配置。';
                return `
                    <div class="notice error">
                        <span class="icon-box"><i class="ri-error-warning-line" aria-hidden="true"></i></span>
                        <div>
                            <div class="primary-text">无法读取受保护数据</div>
                            <p class="text-muted mb-0">${escapeHtml(message)}</p>
                            <div class="inline-actions mt-16"><button class="btn" type="button" data-action="refresh">重试</button><button class="btn primary" type="button" data-page="account">检查 Token</button></div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="notice warning">
                    <span class="icon-box"><i class="ri-key-2-line" aria-hidden="true"></i></span>
                    <div>
                        <div class="primary-text">需要管理 Token 才能读取真实业务数据</div>
                        <p class="text-muted mb-0">` +
                            `后端的统计、资源、日志和转存接口均受 ADMIN_TOKEN 保护。请在用户中心保存 Token 后刷新。` +
                        `</p>
                        <div class="inline-actions mt-16"><button class="btn primary" type="button" data-page="account">前往用户中心</button></div>
                    </div>
                </div>
            `;
        }

        function loadingGrid(count = 4) {
            return `<section class="grid grid-${Math.min(count, 4)}">${Array.from({ length: count }, () => '<div class="skeleton"></div>').join('')}</section>`;
        }

        async function loadHealth() {
            try {
                const payload = await apiRequest('/health');
                state.health = payload;
                state.healthError = '';
            } catch (error) {
                state.health = null;
                state.healthError = error.message || '健康检查失败';
            }
            updateShellStatus();
        }

        async function refreshData(options = {}) {
            state.loading = !options.quiet;
            if (!options.quiet) renderPage(state.page);

            await loadHealth();

            if (!state.token) {
                state.stats = null;
                state.packages = [];
                state.logs = [];
                state.logsTotal = 0;
                state.authError = '';
                state.loading = false;
                updateShellStatus();
                renderPage(state.page);
                return;
            }

            const [statsResult, packagesResult, logsResult] = await Promise.allSettled([
                apiRequest('/api/stats'),
                apiRequest('/api/packages'),
                apiRequest(`/api/logs?limit=${state.logTable.pageSize}&offset=${(state.logTable.page - 1) * state.logTable.pageSize}`)
            ]);

            const failures = [statsResult, packagesResult, logsResult].filter(result => result.status === 'rejected');
            state.authError = failures.length ? failures[0].reason.message : '';

            if (statsResult.status === 'fulfilled') state.stats = statsResult.value;
            if (packagesResult.status === 'fulfilled') state.packages = Array.isArray(packagesResult.value.packages) ? packagesResult.value.packages : [];
            if (logsResult.status === 'fulfilled') {
                state.logs = Array.isArray(logsResult.value.logs) ? logsResult.value.logs : [];
                state.logsTotal = Number(logsResult.value.total || 0);
            }

            state.loading = false;
            state.lastLoadedAt = new Date();
            updateShellStatus();
            renderPage(state.page);
        }

        function updateShellStatus() {
            const pill = $('#healthPill');
            const footer = $('#footerStatus');
            const sessionName = $('#sidebarSessionName');
            const sessionRole = $('#sidebarSessionRole');
            const countBadge = $('#resourceCountBadge');

            if (pill) {
                if (state.health?.status === 'ok') {
                    pill.className = 'system-pill ok';
                    pill.innerHTML = '<span class="pulse-dot"></span> Worker 正常';
                } else if (state.healthError) {
                    pill.className = 'system-pill error';
                    pill.innerHTML = '<span class="pulse-dot"></span> Worker 不可用';
                } else {
                    pill.className = 'system-pill';
                    pill.innerHTML = '<span class="pulse-dot"></span> 检查中';
                }
            }

            if (footer) {
                footer.textContent = state.lastLoadedAt ? `最后加载：${state.lastLoadedAt.toLocaleString('zh-CN')}` : '尚未加载受保护数据';
            }

            if (sessionName) sessionName.textContent = state.token ? (state.authError ? 'Token 未通过' : 'Token 已保存') : '未验证';
            if (sessionRole) sessionRole.textContent = state.token ? maskToken(state.token) : 'Admin Token';
            if (countBadge) countBadge.textContent = String(state.packages.length || 0);
        }

        function renderDashboard() {
            const stats = state.stats;
            const actions = `<button class="btn" type="button" data-action="refresh"><i class="ri-refresh-line" aria-hidden="true"></i>刷新数据</button><button class="btn primary" type="button" data-page="search"><i class="ri-search-2-line" aria-hidden="true"></i>搜索转存</button>`;

            if (state.loading) {
                return `${pageHero('运营仪表盘', 'Realtime Business Data', '统计、资源和日志均来自当前 Worker API。', actions)}${loadingGrid(4)}<div class="grid grid-wide mt-16"><div class="skeleton"></div><div class="skeleton"></div></div>`;
            }

            const statSection = stats ? `
                <section class="grid grid-4">
                    ${metricCard('资源总数', formatNumber(stats.totalPackages), `本月新增 ${formatNumber(stats.newThisMonth)} 个`, 'ri-box-3-line')}
                    ${metricCard('存储占用', escapeHtml(stats.totalSizeFormatted || formatBytes(stats.totalSize)), `${formatNumber(stats.totalPackages)} 个文件记录`, 'ri-database-2-line')}
                    ${metricCard('今日转存', formatNumber(stats.todayActions), '最近 24 小时 add 日志', 'ri-flashlight-line')}
                    ${metricCard('月度变化', formatNumber(stats.monthGrowth), '本月新增 - 上月新增', 'ri-line-chart-line')}
                </section>
            ` : authNotice();

            return `
                ${pageHero('运营仪表盘', 'Realtime Business Data', '统计、资源和日志均来自当前 Worker API。无法从后端获取的数据不会在此页面展示为样例。', actions)}
                ${statSection}
                ${stats ? dashboardDataSections() : ''}
            `;
        }

        function dashboardDataSections() {
            return `
                <section class="grid grid-wide mt-16">
                    <article class="card">
                        <div class="card-header"><div><h2 class="card-title">资源入库趋势</h2><div class="card-subtitle">按 packages.created_at 汇总</div></div></div>
                        ${renderPackageTrendChart()}
                    </article>
                    <article class="card">
                        <div class="card-header"><div><h2 class="card-title">来源类型</h2><div class="card-subtitle">按 packages.source_type 汇总</div></div></div>
                        ${renderSourceBars()}
                    </article>
                </section>
                <section class="grid grid-2 mt-16">
                    <article class="card">
                        <div class="card-header"><div><h2 class="card-title">最新资源</h2><div class="card-subtitle">来自 /api/packages</div></div><button class="btn small" type="button" data-page="packages">全部资源</button></div>
                        ${renderLatestPackages()}
                    </article>
                    <article class="card">
                        <div class="card-header"><div><h2 class="card-title">最近日志</h2><div class="card-subtitle">来自 /api/logs</div></div><button class="btn small" type="button" data-page="logs">全部日志</button></div>
                        ${renderRecentLogs()}
                    </article>
                </section>
            `;
        }

        function makeDailyCounts(items, field, days = 14) {
            const now = new Date();
            const start = new Date(now);
            start.setHours(0, 0, 0, 0);
            start.setDate(start.getDate() - days + 1);
            const buckets = Array.from({ length: days }, (_, index) => {
                const date = new Date(start);
                date.setDate(start.getDate() + index);
                return { key: date.toISOString().slice(0, 10), label: formatDate(date.toISOString()), value: 0 };
            });
            const map = new Map(buckets.map(item => [item.key, item]));
            items.forEach(item => {
                const date = parseDate(item[field]);
                if (!date) return;
                const key = date.toISOString().slice(0, 10);
                if (map.has(key)) map.get(key).value += 1;
            });
            return buckets;
        }

        function renderPackageTrendChart() {
            const data = makeDailyCounts(state.packages, 'created_at');
            const max = Math.max(...data.map(item => item.value), 0);
            if (!max) return emptyState('暂无资源入库趋势', '当前 packages 表没有最近 14 天的入库记录。');

            const width = 720;
            const height = 220;
            const left = 24;
            const right = 16;
            const top = 26;
            const bottom = 36;
            const step = (width - left - right) / Math.max(data.length - 1, 1);
            const points = data.map((item, index) => {
                const x = left + index * step;
                const y = top + (1 - item.value / max) * (height - top - bottom);
                return { ...item, x, y };
            });
            const line = points.map((point, index) => `${index === 0 ? 'M' : 'L'}${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(' ');
            const area = `${line} L${points[points.length - 1].x.toFixed(1)} ${height - bottom} L${points[0].x.toFixed(1)} ${height - bottom} Z`;

            return `
                <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="资源入库趋势">
                    <line class="chart-grid-line" x1="${left}" y1="${top}" x2="${width - right}" y2="${top}"></line>
                    <line class="chart-grid-line" x1="${left}" y1="${(height - bottom + top) / 2}" x2="${width - right}" y2="${(height - bottom + top) / 2}"></line>
                    <line class="chart-grid-line" x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}"></line>
                    <path class="chart-area" d="${area}"></path>
                    <path class="chart-line" d="${line}"></path>
                    <g fill="var(--primary)">${points.map(point => `<circle cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4"><title>${point.label}: ${point.value}</title></circle>`).join('')}</g>
                    <g fill="var(--faint)" font-size="11">${points.filter((_, index) => index % 3 === 0 || index === points.length - 1).map(point => `<text x="${point.x.toFixed(1)}" y="${height - 10}" text-anchor="middle">${point.label}</text>`).join('')}</g>
                </svg>
            `;
        }

        function renderSourceBars() {
            if (!state.packages.length) return emptyState('暂无来源统计', '当前 packages 表没有资源记录。');
            const groups = groupBy(state.packages, pkg => sourceLabel(pkg.source_type));
            const max = Math.max(...groups.map(item => item.count), 1);
            return `<div class="bar-list">${groups.map(item => `
                <div class="bar-row">
                    <span>${escapeHtml(item.label)}</span>
                    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, item.count / max * 100)}%"></div></div>

        function groupBy(items, getLabel) {
            const map = new Map();
            items.forEach(item => {

                map.set(label, (map.get(label) || 0) + 1);

            return Array.from(map, ([label, count]) => ({ label, count })).sort((a, b) => b.count - a.count);

        function filteredPackages() {
            const table = state.packageTable;
            const keyword = table.search.trim().toLowerCase();
            let rows = state.packages.filter(pkg => {
                const matchKeyword = !keyword || [pkg.name, pkg.version, pkg.file_name, pkg.file_path, pkg.source_url, pkg.source_type, pkg.content_type].some(value => String(value || '').toLowerCase().includes(keyword));
                const matchSource = table.source === 'all' || pkg.source_type === table.source;
                const matchContent = table.contentType === 'all' || pkg.content_type === table.contentType;
                const matchDate = !table.fromDate || String(pkg.created_at || '').slice(0, 10) >= table.fromDate;
                return matchKeyword && matchSource && matchContent && matchDate;
            });

            rows.sort((a, b) => {
                const key = table.sortKey;
                const aValue = key === 'file_size' ? Number(a[key] || 0) : String(a[key] || '');
                const bValue = key === 'file_size' ? Number(b[key] || 0) : String(b[key] || '');
                const result = typeof aValue === 'number' ? aValue - bValue : aValue.localeCompare(bValue, 'zh-CN');
                return table.sortDir === 'asc' ? result : -result;
            });
            return rows;
        }

        function sortIcon(key) {

            const authStatus = !state.token ? '<span class="badge warning">未保存 Token</span>' : state.authError ? '<span class="badge error">接口未通过</span>' : '<span class="badge success">最近请求通过</span>';

            return `
                ${pageHero('用户中心', 'Admin Session', '当前后端没有用户资料、角色、工单或财务接口，因此本页只展示真实的本地管理会话和 Worker API 状态。', `<button class="btn" type="button" data-action="refresh"><i class="ri-refresh-line" aria-hidden="true"></i>验证接口</button>`)}
                <section class="grid grid-2">
                    <article class="card">
                        <div class="card-header"><div><h2 class="card-title">管理 Token</h2><div class="card-subtitle">localStorage.admin_token</div></div>${authStatus}</div>
                        <div class="form-grid">
                            <label class="form-field full"><span class="form-label">ADMIN_TOKEN</span><input class="input" id="adminTokenInput" type="password" value="${escapeHtml(state.token)}" placeholder="输入 Cloudflare Worker 环境变量 ADMIN_TOKEN 对应值"><p class="help-text">Token 仅保存在当前浏览器 localStorage，用于调用受保护管理接口。</p></label>
                        </div>
                        <div class="inline-actions mt-16"><button class="btn primary" type="button" data-action="save-token"><i class="ri-save-line" aria-hidden="true"></i>保存并验证</button><button class="btn danger" type="button" data-action="clear-token"><i class="ri-delete-bin-line" aria-hidden="true"></i>清除 Token</button></div>
                    </article>
                    <article class="card">
                        <div class="card-header"><div><h2 class="card-title">会话状态</h2><div class="card-subtitle">Real runtime state</div></div></div>
                        <div class="list-card">
                            <div class="list-item"><span>Token 状态</span><strong>${tokenSaved ? maskToken(state.token) : '未保存'}</strong></div>
                            <div class="list-item"><span>Worker 健康检查</span>${healthStatus}</div>
                            <div class="list-item"><span>受保护接口</span>${authStatus}</div>
                            <div class="list-item"><span>最后加载时间</span><strong>${state.lastLoadedAt ? state.lastLoadedAt.toLocaleString('zh-CN') : '尚未加载'}</strong></div>
                        </div>
                    </article>
                </section>
                <section class="card mt-16">
                    ${emptyState('未展示用户资料样例', '当前项目没有用户表、权限表或用户资料 API。为了避免假数据，本页不会展示姓名、角色、头像、工单、账单等不存在的业务数据。')}
                </section>
            `;
        }

        function renderPage(page = state.page) {
            state.page = page;
            closeDropdowns();
            updateNavigation();

            const renderers = { dashboard: renderDashboard, search: renderSearch, packages: renderPackages, logs: renderLogs, account: renderAccount };
            $('#mainContent').innerHTML = renderers[page]();
            if (page === 'packages') renderPackageTable();
            if (page === 'logs') renderLogTable();
            $('#mainContent').focus({ preventScroll: true });
        }

        function updateNavigation() {
            $$('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.page === state.page));
            const meta = pageMeta[state.page];
            $('#breadcrumbs').innerHTML = `<span>TeavenCDN</span><i class="ri-arrow-right-s-line" aria-hidden="true"></i><span>${meta.title}</span><span class="english">${meta.english}</span>`;
        }

        function maskToken(token) {
            if (!token) return '未保存';
            if (token.length <= 8) return '已保存';
            return `${token.slice(0, 4)}••••${token.slice(-4)}`;
        }

        function initTheme() {
            const stored = localStorage.getItem('teaven-theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            applyTheme(stored || (systemDark ? 'dark' : 'light'));
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
                if (!localStorage.getItem('teaven-theme')) applyTheme(event.matches ? 'dark' : 'light');
            });
        }

        function applyTheme(theme) {
            document.documentElement.dataset.theme = theme;
            const icon = $('#themeToggle i');
            if (icon) icon.className = theme === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
        }

        function toggleTheme() {
            const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('teaven-theme', next);
            applyTheme(next);
            showToast(next === 'dark' ? '已切换为深色模式' : '已切换为浅色模式', 'success');
        }

        async function searchPackage() {
            const input = $('#packageSearchInput');
            const query = input?.value.trim();
            state.search.query = query || '';
            state.search.result = null;
            state.search.versionDetail = null;
            state.search.error = '';

            if (!query) {
                state.search.error = '请输入包名称。';
                renderPage('search');
                return;
            }

            state.search.loading = true;
            renderPage('search');

            try {
                const result = await apiRequest(`/api/search?q=${encodeURIComponent(query)}`);
                state.search.result = result;
                state.search.version = result.latest || (Array.isArray(result.versions) ? result.versions[0] : '') || '';
                state.search.error = '';
                await loadVersionDetail(false);
            } catch (error) {
                state.search.error = error.message || '搜索失败';
            } finally {
                state.search.loading = false;
                renderPage('search');
            }
        }

        async function loadVersionDetail(showError = true) {
            const result = state.search.result;
            const version = state.search.version;
            if (!result?.name || !version) return;
            try {
                state.search.versionDetail = await apiRequest(`/api/search/${encodeURIComponent(result.name)}/${encodeURIComponent(version)}`);
            } catch (error) {
                state.search.versionDetail = null;
                if (showError) showToast(error.message || '版本详情加载失败', 'warning');
            }
        }

        async function favoritePackage() {
            if (!state.token) {
                showToast('请先在用户中心保存管理 Token', 'warning');
                return;
            }
            const result = state.search.result;
            const version = $('#versionSelect')?.value || state.search.version;
            if (!result?.name || !version) {
                showToast('缺少包名或版本', 'warning');
                return;
            }

            try {
                await apiRequest('/api/favorite', { method: 'POST', body: { name: result.name, version } });
                showToast('资源已转存并写入 D1', 'success');
                await refreshData({ quiet: true });
                renderPage('packages');
            } catch (error) {
                showToast(error.message || '转存失败', error.status === 409 ? 'warning' : 'error');
                if (error.status === 409) await refreshData({ quiet: true });
            }
        }

        function openPackageDetail(id) {
            const pkg = state.packages.find(item => String(item.id) === String(id));
            if (!pkg) return;
            $('#drawerTitle').textContent = packageDisplayName(pkg);
            $('#drawerBody').innerHTML = `
                <div class="resource-cell">
                    <span class="resource-icon">${escapeHtml(String(pkg.name || '?').slice(0, 1).toUpperCase())}</span>
                    <div><div class="primary-text">${escapeHtml(packageDisplayName(pkg))}</div><div class="secondary-text mono">${escapeHtml(pkg.file_name || pkg.file_path || '-')}</div></div>
                </div>
                <section class="card mt-16">
                    <div class="card-header"><div><h3 class="card-title">D1 记录</h3><div class="card-subtitle">packages.id = ${escapeHtml(pkg.id)}</div></div></div>
                    <div class="list-card">
                        <div class="list-item"><span>文件路径</span><span class="mono secondary-text">${escapeHtml(pkg.file_path || '-')}</span></div>
                        <div class="list-item"><span>来源类型</span><strong>${escapeHtml(sourceLabel(pkg.source_type))}</strong></div>
                        <div class="list-item"><span>内容类型</span><strong>${escapeHtml(pkg.content_type || '-')}</strong></div>
                        <div class="list-item"><span>文件大小</span><strong>${formatBytes(pkg.file_size)}</strong></div>
                        <div class="list-item"><span>创建时间</span><strong>${formatDateTime(pkg.created_at)}</strong></div>
                    </div>
                </section>
                <section class="card mt-16">
                    <div class="card-header"><div><h3 class="card-title">CDN 链接</h3><div class="card-subtitle">由后端 withCdnUrls 生成</div></div></div>
                    <div class="list-card">
                        <div class="list-item"><span>国内</span><span class="mono secondary-text">${escapeHtml(pkg.cdn_url || '-')}</span></div>
                        <div class="list-item"><span>海外</span><span class="mono secondary-text">${escapeHtml(pkg.global_cdn_url || '-')}</span></div>
                        <div class="list-item"><span>来源 URL</span><span class="mono secondary-text">${escapeHtml(pkg.source_url || '-')}</span></div>
                    </div>
                    <div class="inline-actions mt-16"><button class="btn primary" type="button" data-action="copy-package-url" data-id="${escapeHtml(pkg.id)}"><i class="ri-file-copy-line" aria-hidden="true"></i>复制国内链接</button><button class="btn" type="button" data-action="copy-global-url" data-id="${escapeHtml(pkg.id)}">复制海外链接</button></div>
                </section>
            `;
            $('#drawerBackdrop').classList.add('open');
            $('#detailDrawer').classList.add('open');
            document.body.classList.add('drawer-open');
        }

        function closeDrawer() {
            $('#drawerBackdrop').classList.remove('open');
            $('#detailDrawer').classList.remove('open');
            document.body.classList.remove('drawer-open');
        }

        function openConfirmDelete(ids) {
            const normalized = ids.map(String).filter(Boolean);
            if (!normalized.length) {
                showToast('请先选择资源', 'warning');
                return;
            }
            const rows = normalized.map(id => state.packages.find(pkg => String(pkg.id) === id)).filter(Boolean);
            openModal('确认删除资源', 'DELETE /api/packages/:id', `
                <div class="notice error"><span class="icon-box"><i class="ri-delete-bin-line" aria-hidden="true"></i></span><div><div class="primary-text">将删除 ${formatNumber(rows.length)} 条真实资源记录</div><p class="text-muted mb-0">该操作会调用后端 DELETE 接口并删除 R2 对象。请确认这些资源确实不再需要。</p></div></div>
                <div class="list-card mt-16">${rows.map(pkg => `<div class="list-item"><span>${escapeHtml(packageDisplayName(pkg))}</span><span class="mono secondary-text">${escapeHtml(pkg.file_path || '-')}</span></div>`).join('')}</div>
            `, `<button class="btn" type="button" data-action="close-modal">取消</button><button class="btn danger" type="button" data-action="delete-packages" data-ids="${escapeHtml(normalized.join(','))}">确认删除</button>`);
        }

        async function deletePackages(ids) {
            const normalized = ids.map(String).filter(Boolean);
            if (!normalized.length) return;
            try {
                for (const id of normalized) {
                    await apiRequest(`/api/packages/${encodeURIComponent(id)}`, { method: 'DELETE' });
                    state.packageTable.selected.delete(id);
                }
                closeModal();
                closeDrawer();
                showToast('资源已删除', 'success');
                await refreshData({ quiet: true });
                renderPage('packages');
            } catch (error) {
                showToast(error.message || '删除失败', 'error');
            }
        }

        async function copyText(text, successMessage) {
            if (!text) {
                showToast('没有可复制的链接', 'warning');
                return;
            }
            try {
                if (navigator.clipboard) await navigator.clipboard.writeText(text);
                showToast(successMessage, 'success');
            } catch (error) {
                showToast('复制失败，请手动复制', 'error');
            }
        }

        function exportPackagesCsv() {
            const rows = filteredPackages();
            if (!rows.length) {
                showToast('没有可导出的资源', 'warning');
                return;
            }
            const headers = ['id', 'name', 'version', 'file_name', 'file_path', 'source_url', 'source_type', 'file_size', 'content_type', 'created_at', 'cdn_url', 'global_cdn_url'];
            const csv = [headers.join(',')].concat(rows.map(row => headers.map(key => `"${String(row[key] ?? '').replace(/"/g, '""')}"`).join(','))).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `teaven-cdn-packages-${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('已导出当前真实资源数据', 'success');
        }

        function openModal(title, subtitle, body, footer) {
            $('#modalTitle').textContent = title;
            $('#modalSubtitle').textContent = subtitle;
            $('#modalBody').innerHTML = body;
            $('#modalFooter').innerHTML = footer;
            $('#modalBackdrop').classList.add('open');
            $('#modal').classList.add('open');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            $('#modalBackdrop').classList.remove('open');
            $('#modal').classList.remove('open');
            document.body.classList.remove('modal-open');
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const icon = type === 'success' ? 'ri-checkbox-circle-line' : type === 'error' ? 'ri-close-circle-line' : type === 'warning' ? 'ri-error-warning-line' : 'ri-information-line';
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="${icon}" aria-hidden="true"></i><div><div class="primary-text">${escapeHtml(message)}</div><div class="secondary-text">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div></div>`;
            $('#toastRegion').appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        function closeDropdowns(exceptId) {
            $$('.dropdown-panel.open').forEach(panel => {
                if (panel.id !== exceptId) panel.classList.remove('open');
            });
        }

        document.addEventListener('click', async event => {
            const control = event.target.closest('[data-action], [data-page]');
            if (!control) {
                if (!event.target.closest('.dropdown-wrap')) closeDropdowns();
                return;
            }

            if (control.dataset.page) {
                document.body.classList.remove('nav-open');
                $('#mobileBackdrop').classList.remove('open');
                renderPage(control.dataset.page);
                return;
            }

            const action = control.dataset.action;
            if (control.disabled) return;

            if (action === 'toggle-sidebar-collapse') {
                $('#appShell').classList.toggle('sidebar-collapsed');
                localStorage.setItem('teaven-sidebar', $('#appShell').classList.contains('sidebar-collapsed') ? 'collapsed' : 'expanded');
            }
            if (action === 'open-mobile-nav') { document.body.classList.add('nav-open'); $('#mobileBackdrop').classList.add('open'); }
            if (action === 'close-mobile-nav') { document.body.classList.remove('nav-open'); $('#mobileBackdrop').classList.remove('open'); }
            if (action === 'toggle-theme') toggleTheme();
            if (action === 'refresh') await refreshData({ quiet: false });
            if (action === 'search-package') await searchPackage();
            if (action === 'favorite-package') await favoritePackage();
            if (action === 'save-token') {
                const value = $('#adminTokenInput')?.value.trim() || '';
                state.token = value;
                if (value) localStorage.setItem('admin_token', value);
                else localStorage.removeItem('admin_token');
                showToast(value ? 'Token 已保存，正在验证' : 'Token 已清除', value ? 'success' : 'warning');
                await refreshData({ quiet: false });
            }
            if (action === 'clear-token') {
                state.token = '';
                localStorage.removeItem('admin_token');
                state.stats = null;
                state.packages = [];
                state.logs = [];
                state.logsTotal = 0;
                state.authError = '';
                updateShellStatus();
                showToast('Token 已清除', 'warning');
                renderPage('account');
            }
            if (action === 'open-package-detail') openPackageDetail(control.dataset.id);
            if (action === 'close-drawer') closeDrawer();
            if (action === 'confirm-delete-package') openConfirmDelete([control.dataset.id]);
            if (action === 'batch-delete-packages') openConfirmDelete(Array.from(state.packageTable.selected));
            if (action === 'delete-packages') await deletePackages(String(control.dataset.ids || '').split(','));
            if (action === 'close-modal') closeModal();
            if (action === 'copy-package-url') {
                const pkg = state.packages.find(item => String(item.id) === String(control.dataset.id));
                await copyText(pkg?.cdn_url, '国内 CDN 链接已复制');
            }
            if (action === 'copy-global-url') {
                const pkg = state.packages.find(item => String(item.id) === String(control.dataset.id));
                await copyText(pkg?.global_cdn_url, '海外 CDN 链接已复制');
            }
            if (action === 'export-packages') exportPackagesCsv();
            if (action === 'sort-packages') {
                const key = control.dataset.key;
                state.packageTable.sortDir = state.packageTable.sortKey === key && state.packageTable.sortDir === 'asc' ? 'desc' : 'asc';
                state.packageTable.sortKey = key;
                renderPackageTable();
            }
            if (action === 'change-package-page') {
                state.packageTable.page = Number(control.dataset.pageNumber);
                renderPackageTable();
            }
            if (action === 'toggle-select-all-packages') {
                const rows = filteredPackages().slice((state.packageTable.page - 1) * state.packageTable.pageSize, state.packageTable.page * state.packageTable.pageSize);
                rows.forEach(row => control.checked ? state.packageTable.selected.add(String(row.id)) : state.packageTable.selected.delete(String(row.id)));
                renderPackageTable();
            }
            if (action === 'toggle-package') {
                control.checked ? state.packageTable.selected.add(String(control.dataset.id)) : state.packageTable.selected.delete(String(control.dataset.id));
                renderPackageTable();
            }
            if (action === 'change-log-page') {
                state.logTable.page = Number(control.dataset.pageNumber);
                await refreshData({ quiet: false });
            }
        });

        document.addEventListener('input', event => {
            if (event.target.id === 'packageSearch') {
                state.packageTable.search = event.target.value;
                state.packageTable.page = 1;
                renderPackageTable();
            }
            if (event.target.id === 'logSearch') {
                state.logTable.search = event.target.value;
                renderLogTable();
            }
        });

        document.addEventListener('change', async event => {
            if (event.target.id === 'packageSourceFilter') { state.packageTable.source = event.target.value; state.packageTable.page = 1; renderPackageTable(); }
            if (event.target.id === 'packageContentFilter') { state.packageTable.contentType = event.target.value; state.packageTable.page = 1; renderPackageTable(); }
            if (event.target.id === 'packageDateFilter') { state.packageTable.fromDate = event.target.value; state.packageTable.page = 1; renderPackageTable(); }
            if (event.target.id === 'versionSelect') {
                state.search.version = event.target.value;
                await loadVersionDetail(true);
                renderPage('search');
            }
            if (event.target.id === 'logStatusFilter') { state.logTable.status = event.target.value; renderLogTable(); }
            if (event.target.id === 'logPageSize') {
                state.logTable.pageSize = Number(event.target.value);
                state.logTable.page = 1;
                await refreshData({ quiet: false });
            }
        });

        document.addEventListener('keydown', async event => {
            if (event.key === 'Escape') {
                closeModal();
                closeDrawer();
                closeDropdowns();
                document.body.classList.remove('nav-open');
                $('#mobileBackdrop').classList.remove('open');
            }
            if (event.key === 'Enter' && event.target.id === 'globalSearch') {
                state.packageTable.search = event.target.value.trim();
                state.packageTable.page = 1;
                renderPage('packages');
            }
            if (event.key === 'Enter' && event.target.id === 'packageSearchInput') {
                await searchPackage();
            }
        });

        function init() {
            initTheme();
            if (localStorage.getItem('teaven-sidebar') === 'collapsed') $('#appShell').classList.add('sidebar-collapsed');
            updateShellStatus();
            renderPage('dashboard');
            refreshData({ quiet: true });
        }

        init();
    </script>
</body>
</html>
